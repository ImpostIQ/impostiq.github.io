    <script>
        (function() {
            const getSeasonalInfo = () => {
                const now = new Date();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                if ((month === 10 && day >= 24) || (month === 11 && day <= 7)) return 'halloween';
                if ((month === 12 && day >= 18) || (month === 1 && day <= 1)) return 'christmas';
                return 'default';
            };
            const season = getSeasonalInfo();
            const images = {
                christmas: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Snowman-3d-icon.png",
                halloween: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Jack-O-Lantern-3d-icon.png"
            };
            if (images[season]) {
                const favicon = document.querySelector('link[rel="icon"]');
                if (favicon) {
                    favicon.href = images[season];
                    document.head.removeChild(favicon);
                    document.head.appendChild(favicon);
                }
            }
        })();
    </script>

                        <div className="bg-white/5 rounded-xl p-4 border border-white/5 mb-6 flex-1 min-h-0 overflow-y-auto no-scrollbar">

                        <div className="flex gap-3">

                                <span className="text-[10px] tracking-wider">LOCAL</span>
                            </button>
                            <button onClick={() => { window.location.href = `/?communigory=${cat.id}&mode=online`; }} className="flex-1 bg-white text-slate-950 py-4 rounded-xl font-display font-bold shadow-lg active:scale-95 transition-all flex flex-col items-center justify-center gap-1">
                                <FaIcon name="icon-earth-americas" className="text-xl text-brand-500"/>

                        <div className="w-full mt-4 flex gap-3 flex-shrink-0">

                            {isMine && (

                                    <FaIcon name="icon-pen" className="text-lg text-white/50"/>
                                    <div className="text-white/40 text-[10px] uppercase font-bold tracking-widest truncate">Edit</div>
                                </button>
                            )}
                            {(isMine || isSaved) && (
                                <button onClick={() => { playSound(); onDelete({ id: cat.id, global: isMine }); }} className="flex-1 bg-black/20 p-3 rounded-lg border border-white/5 hover:bg-red-500/10 hover:border-red-500/30 active:scale-95 transition-all flex flex-col items-center justify-center gap-1.5 overflow-hidden">
                                    <FaIcon name={isMine ? "icon-trash-can" : "icon-xmark"} className="text-lg text-red-400/60"/>
                                    <div className="text-red-400/60 text-[10px] uppercase font-bold tracking-widest truncate">{isMine ? 'Delete' : 'Remove'}</div>
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeView, setActiveView] = useState('browse');
            const [activeFilter, setActiveFilter] = useState('trending');
            const [categories, setCategories] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            
            // Cache state to avoid reload delays and connection lost alerts when swapping tabs quickly
            const [categoriesCache, setCategoriesCache] = useState({ trending: null, newest: null, my_categories: null });

            const [alert, setAlert] = useState(null);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [shareData, setShareData] = useState(null);

            // --- AUDIO & MUTE SYNC ---
            const AUDIO_URLS = {
                uiClick: "https://impostiq.github.io/sound/uiclick.mp3",
                openInfo: "https://impostiq.github.io/sound/openinf.mp3",
                switchOn: "https://impostiq.github.io/sound/switchon.mp3",
                switchOff: "https://impostiq.github.io/sound/switchoff.mp3",
                selectCategory: "https://impostiq.github.io/sound/selectcat.mp3"
            };

            const audioManagerRef = useRef(null);
            const [isMuted, setIsMuted] = useState(() => {
                try {
                    const savedMuteState = localStorage.getItem('imposter_isMuted');
                    return savedMuteState !== null ? JSON.parse(savedMuteState) : false;
                } catch {
                    return false;
                }
            });

            useEffect(() => {
                if (audioManagerRef.current) return;
                const manager = {
                    sounds: {},
                    isMuted: isMuted,
                    initSound: function(name, url) {
                        try {
                            const audio = new Audio(url);
                            audio.preload = 'auto';
                            this.sounds[name] = audio;
                        } catch (e) {}
                    },
                    playSound: function(name) {
                        if (this.isMuted) return;
                        const sound = this.sounds[name];
                        if (sound) {
                            sound.currentTime = 0;
                            sound.play().catch(()=>{});
                        }
                    },
                    setMuted: function(muted) {
                        this.isMuted = muted;
                    }
                };
                Object.entries(AUDIO_URLS).forEach(([key, url]) => manager.initSound(key, url));
                audioManagerRef.current = manager;
            }, []);

            useEffect(() => {
                if (audioManagerRef.current) {
                    audioManagerRef.current.setMuted(isMuted);
                }
            }, [isMuted]);

            const handleMuteToggle = () => {
                const newMutedState = !isMuted;
                setIsMuted(newMutedState);
                try {
                    localStorage.setItem('imposter_isMuted', JSON.stringify(newMutedState));
                } catch (e) {}
            };
            
            const playSound = (name = 'uiClick') => {
                audioManagerRef.current?.playSound(name);
            };

            // Upload/Edit State
            const [editId, setEditId] = useState(null);
            const [newCatName, setNewCatName] = useState('');
            const [newCatWords, setNewCatWords] = useState('');
            const [isPrivate, setIsPrivate] = useState(false);
            
            // Icon Selection Modal
            const [isIconModalOpen, setIsIconModalOpen] = useState(false);
            const [selectedIcon, setSelectedIcon] = useState(ICONS_LIST[0].url);

            const [error, setError] = useState('');
            const errorRef = useRef('');
            if (error) errorRef.current = error;

            useEffect(() => {
                if (error) { const timer = setTimeout(() => setError(''), 4000); return () => clearTimeout(timer); }
            }, [error]);

            const getMyIds = () => { try { return JSON.parse(localStorage.getItem('my_communigories') || '[]'); } catch { return []; } };
            const saveMyId = (id) => { const ids = getMyIds(); if (!ids.includes(id)) localStorage.setItem('my_communigories', JSON.stringify([...ids, id])); };
            const removeMyId = (id) => { const ids = getMyIds(); localStorage.setItem('my_communigories', JSON.stringify(ids.filter(i => i !== id))); };

            const getSavedIds = () => { try { return Object.keys(JSON.parse(localStorage.getItem('saved_communigories') || '{}')); } catch { return []; } };

            const fetchCategories = async (filterToFetch) => {
				setIsLoading(true);

				// Step 2: Check if we can use cached data for a near-instant load.
				if (categoriesCache[filterToFetch] && !searchQuery) {
					setCategories(categoriesCache[filterToFetch]);
					setIsLoading(false);
					return;
				}
				
				// Step 3: If not using cache, clear the current categories. 
				// This is now safe because the loading spinner is already visible.
				setCategories([]);

				try {
					let query = db.collection('communigories');
					if (filterToFetch === 'trending') query = query.orderBy('downloads', 'desc').limit(200);
					else if (filterToFetch === 'newest') query = query.orderBy('createdAt', 'desc').limit(200);

					const snapshot = await query.get();
					let results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

					if (filterToFetch === 'my_categories') {
						const myIds = getMyIds();
						const savedIds = getSavedIds();
						const allRelevantIds = [...new Set([...myIds, ...savedIds])];
						
						const onlineData = results.filter(cat => allRelevantIds.includes(cat.id));
						const savedData = Object.values(JSON.parse(localStorage.getItem('saved_communigories') || '{}'))
							.filter(s => !onlineData.some(cat => cat.id === s.id));
							
						results = [...onlineData, ...savedData];
					} else {
						results = results.filter(cat => !cat.isPrivate);
					}

					if (searchQuery) {
						results = results.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase()));
					}
					
					setCategories(results);
					
					if (!searchQuery) {
						setCategoriesCache(prev => ({ ...prev, [filterToFetch]: results }));
					}
				} catch (e) { 
					console.error("Fetch Error:", e);
					if (!categoriesCache[filterToFetch] || categoriesCache[filterToFetch].length === 0) {
						setAlert({ title: 'Connection Lost', message: 'Failed to load community categories. Check your internet connection.', type: 'error' }); 
					}
				} finally {
					// Step 4: Always ensure loading is set to false after the operation completes.
					setIsLoading(false);
				}
			};

            useEffect(() => { 
                if (activeView === 'browse') {
                    fetchCategories(activeFilter); 
                }
            }, [activeView, activeFilter, searchQuery]);

            const handleFilterChange = (newFilter) => {
                if (newFilter === activeFilter) return;
                setActiveFilter(newFilter);
            };

            const handleUpload = async () => {
                if (!newCatName.trim()) { setError('Category name is required.'); return; }
                const wordsArray = newCatWords.split(',').map(w => w.trim()).filter(w => w.length > 0);
                if (wordsArray.length < 10) { setError('Please add at least 10 words.'); return; }

                setIsLoading(true);
                try {
                    const payload = { name: newCatName.trim(), words: wordsArray, icon: selectedIcon, isPrivate };
                    
                    if (editId) {
                        payload.edits = firebase.firestore.FieldValue.increment(1);
                        await db.collection('communigories').doc(editId).update(payload);
                        setAlert({ title: 'Success', message: 'Category updated successfully!', type: 'success' });
                    } else {
                        const newDocId = generateCategoryId();
                        payload.downloads = 0;
                        payload.edits = 0;
                        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection('communigories').doc(newDocId).set(payload);
                        
                        saveMyId(newDocId);
                        
                        const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                        savedComms[newDocId] = { id: newDocId, name: payload.name, icon: payload.icon, words: payload.words };
                        localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                        
                        setAlert({ title: 'Uploaded!', message: 'Your category is live and saved to your device.', type: 'success' });
                    }
                    
                    // Invalidate caches so we see the new changes
                    setCategoriesCache(prev => ({ ...prev, my_categories: null, newest: null }));
                    
                    setActiveView('browse');
                    setActiveFilter(editId ? activeFilter : 'my_categories');
                    setNewCatName(''); setNewCatWords(''); setIsPrivate(false); setEditId(null);
                } catch (e) { setAlert({ title: 'Error', message: 'Failed to upload category.', type: 'error' }); }
                setIsLoading(false);
            };

            const triggerEdit = (cat) => {
                setEditId(cat.id);
                setNewCatName(cat.name);
                setNewCatWords(cat.words.join(', '));
                setSelectedIcon(cat.icon || ICONS_LIST[0].url);
                setIsPrivate(cat.isPrivate || false);
                setSelectedCategory(null);
                setActiveView('upload');
            };

            const executeDelete = async () => {
                if (!confirmDelete) return;
                const { id, global } = confirmDelete;
                try {
                    if (global) {
                        await db.collection('communigories').doc(id).delete();
                        removeMyId(id);
                    }
                    
                    const savedComms = JSON.parse(localStorage.getItem('saved_communigories') || '{}');
                    if (savedComms[id]) {
                        delete savedComms[id];
                        localStorage.setItem('saved_communigories', JSON.stringify(savedComms));
                    }
                    
                    setCategoriesCache({ trending: null, newest: null, my_categories: null });
                    
                    setCategories(prev => prev.filter(c => c.id !== id));
                    
                    setAlert({ title: global ? 'Deleted' : 'Removed', message: global ? 'Category deleted from community successfully.' : 'Category removed from your library.', type: 'success' });
                    setConfirmDelete(null);
                    setSelectedCategory(null);
                } catch (e) { setAlert({ title: 'Error', message: 'Failed to delete category.', type: 'error' }); }
            };

            const triggerShare = (cat) => {
                setSelectedCategory(null);
                const link = `https://impostiq.github.io/?communigory=${cat.id}`;
                setShareData({
                    title: `Play "${cat.name}" on Impostiq!`,
                    text: `I found this awesome category for Impostiq. Let's play!`,
                    url: link,
                    iconUrl: cat.icon
                });
            };

            const currentWordCount = newCatWords.split(',').filter(w=>w.trim()).length;

            let emptyTitle = "No categories found";
            let emptyDesc = "Try adjusting your search or upload a new category to the community.";
            let emptyIcon = "icon-search";

            if (searchQuery) {
                emptyTitle = "No matches found";
                emptyDesc = `We couldn't find any categories matching "${searchQuery}". Try a different keyword.`;
                emptyIcon = "icon-search";
            } else if (activeFilter === 'my_categories') {
                emptyTitle = "Your vault is empty";
                emptyDesc = "You haven't saved or created any categories yet. Explore the community to find some!";
                emptyIcon = "icon-folder-empty";
            } else {
                emptyTitle = "It's quiet here...";
                emptyDesc = "There are no categories to show right now. Be the first to upload one!";
                emptyIcon = "icon-no-result";
            }

            return (
                <div className="w-full h-full text-slate-200 font-sans selection:bg-brand-500/30">
                    
                    {/* Background Elements at the absolute root */}
                    <div className="fixed inset-0 bg-[#020617] -z-10"></div>
                    <div className="absolute inset-0 pointer-events-none z-0">
                        <div className="blob bg-brand-600/30 top-[-20%] left-[-20%] w-[60%] h-[60%]"></div>
                        <div className="blob bg-cyan-600/30 bottom-[-20%] right-[-20%] w-[60%] h-[60%] animation-delay-2000"></div>
                    </div>

                    <IconSelectionModal 
                        isOpen={isIconModalOpen} 
                        onClose={() => setIsIconModalOpen(false)} 
                        onSelect={setSelectedIcon} 
                        currentSelection={selectedIcon} 
                        playSound={playSound}
                    />

                    {alert && <AlertModal {...alert} onClose={() => setAlert(null)} playSound={playSound} />}
                    {confirmDelete && (
                        <ConfirmModal 
                            title={confirmDelete.global ? "Delete Category?" : "Remove Category?"} 
                            message={confirmDelete.global ? "Are you sure? Everyone using it will lose access." : "Remove this from your saved local categories? You can find it again in the community."} 
                            onConfirm={executeDelete} 
                            onCancel={() => setConfirmDelete(null)} 
                            playSound={playSound}
                        />
                    )}
                    {shareData && <CustomShareModal shareData={shareData} onClose={() => setShareData(null)} playSound={playSound} />}
                    
                    {selectedCategory && (
                        <CategoryDetailsModal 
                            cat={selectedCategory} 
                            isMine={getMyIds().includes(selectedCategory.id)} 
                            isSaved={getSavedIds().includes(selectedCategory.id)}
                            onClose={() => setSelectedCategory(null)} 
                            onEdit={triggerEdit} 
                            onDelete={(deleteData) => setConfirmDelete(deleteData)} 
                            onShare={triggerShare}
                            playSound={playSound}
                        />
                    )}

                    {/* Main Application Container */}
                    <div className="flex flex-col h-[100dvh] relative z-10 animate-fade-in">
                        
                        <div className="absolute top-6 left-6 z-20">
                            <button 
                                onClick={() => {
                                    if (activeView === 'upload') {
                                        setActiveView('browse');
                                        setEditId(null);
                                        setNewCatName('');
                                        setNewCatWords('');
                                        setIsPrivate(false);
                                        setError('');
                                    } else {
                                        window.location.href = '/';
                                    }
                                }} 
                                className="w-12 h-12 flex items-center justify-center bg-white/5 rounded-full text-white/50 hover:bg-white/10 hover:text-white active:scale-90 transition-all shadow-md"
                            >
                                <FaIcon name="icon-chevron-left" className="text-xl" />
                            </button>
                        </div>
                        
                        <div className="absolute top-6 right-6 z-20 flex gap-3">
                            <button 
                                onClick={() => { 
                                    setActiveView(activeView === 'upload' ? 'browse' : 'upload'); 
                                    setEditId(null); setNewCatName(''); setNewCatWords(''); setIsPrivate(false); setError(''); 
                                }}
                                className={`w-12 h-12 flex items-center justify-center rounded-full transition-all active:scale-90 shadow-md ${activeView === 'upload' ? 'bg-brand-500 text-white' : 'bg-white/5 text-white/50 hover:bg-white/10 hover:text-white'}`}
                            >
                                <FaIcon name="icon-cloud-up" className="text-xl" />
                            </button>
                            <button onClick={() => { handleMuteToggle(); }} className="w-12 h-12 flex items-center justify-center bg-white/5 rounded-full text-white/50 hover:bg-white/10 hover:text-white active:scale-90 transition-all shadow-md">
                                {isMuted ? (
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" className="w-5 h-5 fill-current">
                                        <path d="m23.707,22.293c.391.391.391,1.023,0,1.414-.195.195-.451.293-.707.293s-.512-.098-.707-.293L.293,1.707C-.098,1.316-.098.684.293.293S1.316-.098,1.707.293l4.628,4.628C8.142,2.461,10.839.757,13.828.207c.288-.056.593.025.82.215.229.19.36.472.36.769v12.404l1.688,1.688c1.806-1.817,1.803-4.763-.01-6.576-.391-.391-.391-1.023,0-1.414.391-.391,1.023-.391,1.414,0,2.592,2.592,2.596,6.808.01,9.404l1.44,1.44c3.316-3.481,3.266-9.011-.152-12.43-.391-.391-.391-1.023,0-1.414s1.023-.391,1.414,0c4.198,4.198,4.249,10.997.152,15.258l2.742,2.742ZM.009,10v4c0,2.757,2.243,5,5,5h1.269c1.807,2.502,4.53,4.237,7.551,4.793.06.011.12.017.181.017.232,0,.459-.081.64-.231.229-.19.36-.472.36-.769v-3.579L1.881,6.103C.74,7.02.009,8.426.009,10Z"/>
                                    </svg>
                                ) : (
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" className="w-5 h-5 fill-current">
                                        <path d="M20.8,4.293A1,1,0,0,0,19.39,5.707a8.911,8.911,0,0,1,0,12.586A1,1,0,1,0,20.8,19.707,10.911,10.911,0,0,0,20.8,4.293ZM18.093,7.293a1,1,0,1,0-1.414,1.414,4.664,4.664,0,0,1,0,6.586,1,1,0,1,0,1.414,1.414A6.665,6.665,0,0,0,18.093,7.293ZM13.819.207A12.055,12.055,0,0,0,6.268,5H5a5.006,5.006,0,0,0-5,5v4a5.006,5.006,0,0,0,5,5H6.269a12.051,12.051,0,0,0,7.55,4.793A1,1,0,0,0,15,22.81V1.19A1,1,0,0,0,13.819.207Z"/>
                                    </svg>
                                )}
                            </button>
                        </div>

                        <div className={`flex-1 overflow-y-auto no-scrollbar ${activeView === 'upload' ? 'pb-32' : 'pb-10'}`}>
                            <div className="max-w-lg mx-auto p-6 pt-28">
                                
                                <div className="mb-8 text-center">
                                    <h1 className="text-4xl sm:text-5xl font-display font-black text-transparent bg-clip-text bg-gradient-to-br from-white via-white to-white/50 mb-2 drop-shadow-lg tracking-tight pb-2 leading-tight">
										{activeView === 'upload' ? (editId ? 'Edit Category' : 'Upload Category') : 'Communigories'}
									</h1>
                                    <div className="subtle-shine-container inline-flex items-center gap-2 px-3 py-1 rounded-[0.5rem] bg-white/5 border border-white/10 backdrop-blur-md">
                                        <span className="text-white/60 text-[10px] font-bold tracking-[0.3em] uppercase">
                                            {activeView === 'upload' ? (editId ? 'Update your category' : 'Contribute to the community') : 'Discover & Share'}
                                        </span>
                                    </div>
                                </div>

                                {activeView === 'browse' && (
                                    <div className="relative flex bg-black/40 p-1.5 rounded-[1.25rem] mb-6 border border-white/5 shadow-inner isolate">
                                        <div 
                                            className="absolute top-1.5 bottom-1.5 rounded-xl bg-brand-500 shadow-lg transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] z-0"
                                            style={{ 
                                                width: 'calc((100% - 12px) / 3)', 
                                                left: '6px',
                                                transform: `translateX(calc(${['trending', 'newest', 'my_categories'].indexOf(activeFilter)} * 100%))` 
                                            }}
                                        />
                                        {[
                                            { id: 'trending', label: 'Trending', icon: 'icon-fire' },
                                            { id: 'newest', label: 'Newest', icon: 'icon-sparkles' },
                                            { id: 'my_categories', label: 'Library', icon: 'icon-folder-open' }
                                        ].map(tab => (
                                            <button 
                                                key={tab.id} 
                                                onClick={() => { handleFilterChange(tab.id); }}
                                                className={`relative z-10 flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-[13px] font-bold transition-colors duration-300 active:scale-95 ${activeFilter === tab.id ? 'text-white' : 'text-white/50 hover:text-white/80'}`}
                                            >
                                                <FaIcon name={tab.icon} className={activeFilter === tab.id ? '' : 'opacity-70'} />
                                                <span className="hidden sm:block">{tab.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {activeView === 'upload' ? (
                                    <section className="glass-panel rounded-[2rem] overflow-hidden border border-white/10 shadow-lg">
                                        <div className="text-center py-3 bg-black/50 border-b border-white/5">
                                            <h2 className="text-xs font-bold tracking-widest text-white/80 uppercase">
                                                <FaIcon name={editId ? "icon-pen" : "icon-cloud-up"} className="text-brand-400 mr-1" /> {editId ? 'Edit Category' : 'Upload Category'}
                                            </h2>
                                        </div>
                                        <div className="p-4 flex flex-col gap-4">
                                            
                                            <div className="bg-black/20 border border-white/5 rounded-[1.5rem] p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                <div className="flex items-center gap-4 w-full sm:w-auto">
                                                    <div className="w-14 h-14 rounded-[1rem] bg-black/20 border border-white/10 flex items-center justify-center flex-shrink-0">
                                                        <img src={selectedIcon} className="w-8 h-8 object-contain drop-shadow-md" draggable="false" />
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold text-white/90 text-sm">Category Icon</h3>
                                                        <p className="text-white/40 text-xs mt-1 leading-relaxed">The visual symbol for your category in the community feed.</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => { playSound(); setIsIconModalOpen(true); }} className="w-full sm:w-12 sm:h-12 flex items-center justify-center gap-2 px-4 py-3 sm:p-0 bg-white/10 hover:bg-white/20 text-white rounded-lg sm:rounded-[1rem] text-xs font-bold transition-all active:scale-95 flex-shrink-0 border border-white/5 sm:border-transparent">
                                                    <FaIcon name="icon-change" className="text-sm" />
                                                    <span className="sm:hidden tracking-wider">CHANGE</span>
                                                </button>
                                            </div>

                                            <div className="flex items-center gap-3 bg-slate-950/50 rounded-xl border border-white/5 focus-within:border-brand-500/50 focus-within:bg-slate-950/80 transition-colors pr-4 relative z-10">
                                                <input type="text" maxLength="25" placeholder="Category Name" value={newCatName} onChange={e => {setNewCatName(e.target.value); setError('');}}
                                                    className="flex-1 bg-transparent px-5 py-4 outline-none focus:outline-none focus:ring-0 focus:shadow-none appearance-none placeholder:text-white/20 font-display font-semibold text-lg text-white min-w-0"
                                                />
                                            </div>

                                            <div className="bg-slate-950/50 rounded-xl border border-white/5 focus-within:border-brand-500/50 focus-within:bg-slate-950/80 transition-colors relative z-10">
                                                <textarea rows="5" placeholder="Spongebob, iCarly, Drake & Josh..." value={newCatWords} onChange={e => {setNewCatWords(e.target.value); setError('');}}
                                                    className="w-full bg-transparent px-5 py-4 outline-none focus:outline-none focus:ring-0 focus:shadow-none appearance-none placeholder:text-white/20 font-display font-semibold text-lg text-white resize-none leading-relaxed no-scrollbar"
                                                ></textarea>
                                            </div>

                                            <div className="flex items-center justify-between bg-black/20 border border-white/5 rounded-[1.5rem] p-4 transition-all">
                                                <div className="flex items-center gap-4 pr-4">
                                                    <div className="w-10 h-10 rounded-full bg-orange-500/20 flex items-center justify-center text-orange-400 flex-shrink-0">
                                                        <FaIcon name="icon-lock" className="text-lg" />
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold text-white/90 text-sm">Private Category</h3>
                                                        <p className="text-white/40 text-xs mt-1 leading-relaxed">Hides your category from the public community feed. Only accessible via share link.</p>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => { playSound(!isPrivate ? 'switchOn' : 'switchOff'); setIsPrivate(!isPrivate); }}
                                                    className={`group flex-shrink-0 w-12 h-7 rounded-full p-1 cursor-pointer transition-all duration-300 ${isPrivate ? 'bg-orange-500/80' : 'bg-white/10'}`}
                                                >
                                                    <div className={`w-5 h-5 group-active:w-6 bg-white rounded-full shadow-md transform transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] ${isPrivate ? 'translate-x-5 group-active:translate-x-4' : 'translate-x-0'}`} />
                                                </button>
                                            </div>
                                        </div>

                                        <div className={`grid transition-all duration-300 ease-in-out px-4 ${error ? 'grid-rows-[1fr] opacity-100 pb-4' : 'grid-rows-[0fr] opacity-0 pb-0'}`}>
                                            <div className="overflow-hidden">
                                                <div className="flex items-center justify-center gap-2 text-red-400 text-sm font-medium">
                                                    <FaIcon name="icon-circle-exclamation" className="text-xs flex-shrink-0 mt-[1px]" />
                                                    <span className="truncate">{error || errorRef.current}</span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="text-center py-3 bg-black/50 border-t border-white/5">
                                            <p className="text-xs text-white/60 font-semibold px-4 flex items-center justify-center gap-2">
                                                <span className="text-[10px] font-bold text-white/40 uppercase tracking-widest">
                                                    Current Count: <span className={currentWordCount >= 10 ? "text-brand-400" : "text-brand-400"}>{currentWordCount} / 10 MIN</span>
                                                </span>
                                            </p>
                                        </div>
                                    </section>
                                ) : (
                                    <div>
                                        <div className="relative mb-6">
                                            <div className="absolute left-5 top-1/2 -translate-y-1/2 text-white/30 text-lg flex items-center justify-center"><FaIcon name="icon-search" /></div>
                                            <input type="text" placeholder="Search categories..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                                className="w-full bg-slate-950/50 rounded-xl pl-14 pr-5 py-4 outline-none focus:outline-none focus:ring-0 focus:shadow-none appearance-none border border-white/5 focus:border-brand-500/50 focus:bg-slate-950/80 transition-colors placeholder:text-white/20 font-display font-semibold text-lg text-white"
                                            />
                                        </div>

                                        {isLoading ? (
                                            <div className="text-center py-20 flex flex-col items-center justify-center animate-fade-in">
                                                <svg className="sleek-spinner w-12 h-12 text-brand-500 drop-shadow-sm mb-6" viewBox="25 25 50 50"><circle cx="50" cy="50" r="20"></circle></svg>
                                            </div>
                                        ) : categories.length === 0 ? (
                                            <div className="text-center py-20 flex flex-col items-center justify-center animate-fade-in">
                                                <div className="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 ring-1 ring-white/10 shadow-[inset_0_0_20px_rgba(255,255,255,0.02)]">
                                                    <FaIcon name={emptyIcon} className="text-white/30 text-4xl" />
                                                </div>
                                                <h2 className="text-2xl font-display font-bold mb-3 text-white tracking-tight">{emptyTitle}</h2>
                                                <p className="text-white/50 text-sm font-medium leading-relaxed max-w-[260px] mx-auto">
                                                    {emptyDesc}
                                                </p>
                                                {activeFilter === 'my_categories' && !searchQuery && (
                                                    <button 
                                                        onClick={() => { playSound(); handleFilterChange('trending'); }}
                                                        className="mt-6 px-6 py-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold text-xs tracking-wider uppercase rounded-xl transition-all active:scale-95"
                                                    >
                                                        Browse Trending
                                                    </button>
                                                )}
                                                {searchQuery && (
                                                    <button 
                                                        onClick={() => { playSound(); setSearchQuery(''); }}
                                                        className="mt-6 px-6 py-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold text-xs tracking-wider uppercase rounded-xl transition-all active:scale-95"
                                                    >
                                                        Clear Search
                                                    </button>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-2 gap-4">
                                                {categories.map(cat => (
                                                    <button 
                                                        key={cat.id} 
                                                        onClick={() => { playSound('openInfo'); setSelectedCategory(cat); }}
                                                        className="relative overflow-hidden flex flex-col items-center rounded-[1.5rem] transition-all duration-300 group min-h-[130px] border bg-slate-800/40 border-white/5 hover:bg-white/5 hover:border-white/10 backdrop-blur-md active:scale-95"
                                                    >
                                                        {!cat.isPrivate && (
                                                            <div className="w-full text-center py-2 bg-black/50 border-b border-white/5">
                                                                <div className="flex justify-center items-center gap-4 text-[10px] font-bold text-white/60 tracking-wider">
                                                                    <span className="flex items-center gap-1.5"><FaIcon name="icon-fire" className="text-white/60" /> {cat.downloads || 0}</span>
                                                                    <span className="flex items-center gap-1.5"><FaIcon name="icon-pen" className="text-white/60" /> {cat.edits || 0}</span>
                                                                </div>
                                                            </div>
                                                        )}
                                                        
                                                        <div className="relative flex-1 w-full flex flex-col items-center justify-center gap-3 p-4">
                                                            {cat.isPrivate && (
                                                                <div className="absolute top-3 right-3 bg-black/60 backdrop-blur-sm p-1.5 rounded-md text-[10px] font-bold text-white/50 flex items-center shadow-sm border border-white/10 z-20">
                                                                    <FaIcon name="icon-lock" className="text-[10px]" />
                                                                </div>
                                                            )}
                                                            <img src={cat.icon} className="w-10 h-10 transition-transform duration-300 drop-shadow-md opacity-60 group-hover:opacity-100 group-hover:scale-110" alt="" draggable="false" />
                                                            <span className="text-xs font-bold tracking-wide text-white text-center leading-tight">{cat.name}</span>
                                                        </div>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Fixed Bottom Bar - Upload Button */}
                        {activeView === 'upload' && (
                            <div className="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent z-50">
                                <div className="max-w-lg mx-auto pb-[env(safe-area-inset-bottom)]">
                                    <button onClick={() => { playSound(); handleUpload(); }} disabled={isLoading}
                                        className="w-full h-[68px] flex items-center justify-center bg-white text-slate-950 font-display font-bold text-lg py-5 rounded-[1.5rem] shadow-[0_0_30px_rgba(255,255,255,0.1)] hover:shadow-[0_0_50px_rgba(255,255,255,0.2)] disabled:opacity-50 disabled:shadow-none active:scale-[0.98] transition-all"
                                    >
                                        {isLoading ? (
                                            <div className="flex items-center justify-center gap-3">
                                                <svg className="sleek-spinner w-6 h-6 text-brand-500 drop-shadow-sm" viewBox="25 25 50 50"><circle cx="50" cy="50" r="20"></circle></svg>
                                                <span className="animate-pulse text-slate-950/80">{editId ? 'SAVING...' : 'UPLOADING...'}</span>
                                            </div>
                                        ) : (
                                            <span className="flex items-center gap-3">
                                                <FaIcon name={editId ? "icon-pen" : "icon-cloud-up-button"} className="text-lg" /> 
                                                {editId ? "SAVE CHANGES" : "UPLOAD TO COMMUNITY"}
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
