<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>404 Page Not Found • Impostiq</title>
    <link rel="icon" id="dynamic-favicon" href="https://impostiq.github.io/images/404icon192.png" sizes="192x192" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
	
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    cursor: {
                        default: "url('https://impostiq.github.io/images/cursors/default.cur'), default",
                        pointer: "url('https://impostiq.github.io/images/cursors/pointer.cur'), pointer",
                        text: "url('https://impostiq.github.io/images/cursors/text.cur'), text",
                        'not-allowed': "url('https://impostiq.github.io/images/cursors/not-allowed.cur'), not-allowed",
                    },
                    colors: {
                        slate: {
                            850: '#151e2e',
                            950: '#020617',
                        },
                        brand: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

		body, button:disabled, .cursor-default, .cursor-wait { 
            cursor: url('https://impostiq.github.io/images/cursors/default.cur'), default !important; 
        }
        
        button:not(:disabled), a, [role="button"], .cursor-pointer { 
            cursor: url('https://impostiq.github.io/images/cursors/pointer.cur'), pointer !important; 
        }
        
        input, textarea, .cursor-text { 
            cursor: url('https://impostiq.github.io/images/cursors/text.cur'), text !important; 
        }
        
        button:disabled:not(.w-full), .cursor-not-allowed, .disabled\:cursor-not-allowed:disabled { 
            cursor: url('https://impostiq.github.io/images/cursors/not-allowed.cur'), not-allowed !important; 
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .fluid-bg {
			position: fixed;
			inset: 0;
			z-index: -10;
			background: #020617;
			overflow: hidden;
			pointer-events: none;
			user-select: none;
		}

		.fluid-bg::after {
			content: '';
			position: absolute;
			inset: 0;
			background: radial-gradient(circle at center, transparent 0%, #020617 120%);
			z-index: 1;
		}

		.fluid-layer {
            position: absolute;
            top: -50vh;
            left: -50vw;
            width: 200vw;
            height: 200vh;
            filter: blur(150px);
            transform-origin: center;
            opacity: 0.1; 
            animation: fluid-spin 30s linear infinite;
        }
        
        .fluid-layer-1 {
            background: conic-gradient(from 90deg at 50% 50%, #020617 0deg, transparent 120deg, #0e4690 180deg, transparent 300deg, #020617 360deg);
        }
        
        .fluid-layer-2 {
            background: conic-gradient(from 270deg at 50% 50%, transparent 0deg, #195f85 90deg, transparent 180deg, #09334a 270deg, transparent 360deg);
            animation-duration: 45s;
            animation-direction: reverse;
            opacity: 0.5; 
        }

		.fluid-glass {
			position: absolute;
			inset: 0;
			z-index: 2; 
			backdrop-filter: blur(50px) saturate(130%);
			-webkit-backdrop-filter: blur(50px) saturate(130%);
			background-color: rgba(2, 6, 23, 0.25);
			
			background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
			background-size: 130px;
			background-repeat: repeat; 
		}

		@keyframes fluid-spin {
			0% { transform: rotate(0deg) scale(1) translate(0, 0); }
			33% { transform: rotate(120deg) scale(1.05) translate(2%, -2%); }
			66% { transform: rotate(240deg) scale(0.95) translate(-2%, 2%); }
			100% { transform: rotate(360deg) scale(1) translate(0, 0); }
		}
    </style>
	
	<script>
		document.addEventListener('contextmenu', function(e) {
			e.preventDefault();
		});

		document.addEventListener('keydown', function(e) {
			if (
				e.keyCode === 123 || 
				(e.ctrlKey && e.shiftKey && e.keyCode === 73) || 
				(e.ctrlKey && e.shiftKey && e.keyCode === 74) ||
				(e.ctrlKey && e.shiftKey && e.keyCode === 67) || 
				(e.ctrlKey && e.keyCode === 85) ||
				(e.ctrlKey && e.keyCode === 83) || 
				(e.ctrlKey && e.keyCode === 80) || 
				(e.metaKey && e.keyCode === 83) ||
				(e.metaKey && e.keyCode === 80) ||
				(e.metaKey && e.altKey && e.keyCode === 73) 
			) {
				e.preventDefault();
				return false;
			}
		});
	</script>
</head>
<body class="min-h-[100dvh] flex flex-col items-center justify-center p-6 relative">

    <div class="fluid-bg">
		<div class="fluid-layer fluid-layer-1"></div>
		<div class="fluid-layer fluid-layer-2"></div>
		<div class="fluid-glass"></div>
	</div>

    <div class="relative z-10 w-full max-w-sm flex flex-col items-center animate-fadeIn">
        
        <div class="relative w-40 h-40 flex justify-center z-20 -mb-2.5">
            <div class="absolute inset-0 bg-brand-500/20 blur-2xl rounded-full animate-pulse-slow"></div>
            
            <img src="https://em-content.zobj.net/source/microsoft-teams/363/man-construction-worker-medium-dark-skin-tone_1f477-1f3fe-200d-2642-fe0f.png" 
                 class="fade-emoji absolute bottom-0 w-40 h-40 object-contain object-bottom drop-shadow-2xl transition-opacity duration-1000 opacity-100" 
                 draggable="false" alt="Worker">
                 
            <img src="https://em-content.zobj.net/source/microsoft-teams/337/factory-worker-light-skin-tone_1f9d1-1f3fb-200d-1f3ed.png" 
                 class="fade-emoji absolute bottom-0 w-40 h-40 object-contain object-bottom drop-shadow-2xl transition-opacity duration-1000 opacity-0" 
                 draggable="false" alt="Factory Worker">
                 
            <img src="https://em-content.zobj.net/source/microsoft-teams/337/man-artist-medium-skin-tone_1f468-1f3fd-200d-1f3a8.png" 
                 class="fade-emoji absolute bottom-0 w-40 h-40 object-contain object-bottom drop-shadow-2xl transition-opacity duration-1000 opacity-0" 
                 draggable="false" alt="Artist">
        </div>

        <div class="relative z-10 w-full glass-panel rounded-[2.5rem] p-8 pt-8 text-center animate-slide-up">
            
            <h1 class="text-4xl font-display font-black text-transparent bg-clip-text bg-gradient-to-br from-white via-white to-white/50 mb-4 drop-shadow-lg tracking-tight">
                404 Not Found
            </h1>
            
            <p class="text-white/60 text-sm font-medium leading-relaxed mb-8 mx-auto">
                We couldn't find the page you’re looking for. It might have been moved, or the link is just broken.
            </p>

             <button onclick="window.location.href='/'"
				  class="w-full bg-white text-slate-950 font-display font-bold text-lg py-5 rounded-[1.5rem] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
				  <svg xmlns="http://www.w3.org/2000/svg"
					   viewBox="0 0 512 512"
					   fill="currentColor"
					   class="w-5 h-5"
					   shape-rendering="geometricPrecision">
					<path d="M490.134,185.472L338.966,34.304c-45.855-45.737-120.076-45.737-165.931,0L21.867,185.472C7.819,199.445-0.055,218.457,0,238.272v221.397C0.047,488.568,23.475,511.976,52.374,512h407.253c28.899-0.023,52.326-23.432,52.373-52.331V238.272C512.056,218.457,504.182,199.445,490.134,185.472zM448,448H341.334v-67.883c0-44.984-36.467-81.451-81.451-81.451c0,0,0,0,0,0h-7.765c-44.984,0-81.451,36.467-81.451,81.451l0,0V448H64V238.272c0.007-2.829,1.125-5.541,3.115-7.552L218.283,79.552c20.825-20.831,54.594-20.835,75.425-0.01c0.003,0.003,0.007,0.007,0.01,0.01L444.886,230.72c1.989,2.011,3.108,4.723,3.115,7.552V448z"/>
				  </svg>
				  RETURN TO HOME
			</button>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emojis = document.querySelectorAll('.fade-emoji');
            let currentIndex = 0;

            setInterval(() => {
                emojis[currentIndex].classList.remove('opacity-100');
                emojis[currentIndex].classList.add('opacity-0');

                currentIndex = (currentIndex + 1) % emojis.length;

                emojis[currentIndex].classList.remove('opacity-0');
                emojis[currentIndex].classList.add('opacity-100');
            }, 5000);
        });
    </script>
</body>
</html>
