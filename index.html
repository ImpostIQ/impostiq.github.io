    <script>
		(function() {
			const isBot = /bot|googlebot|crawler|spider|robot|crawling/i.test(navigator.userAgent);
			if (isBot) return; 
			
			const favicon = document.getElementById('dynamic-favicon');
			if (!favicon) return;

			let iconToLoad = "https://impostiq.github.io/images/favicon192.png";
			
			const getSeasonalInfo = () => {
				const now = new Date();
				const month = now.getMonth() + 1;
				const day = now.getDate();
				
				if ((month === 10 && day >= 24) || (month === 11 && day <= 7)) return 'halloween';
				if ((month === 12 && day >= 18) || (month === 1 && day <= 1)) return 'christmas';
				return 'default';
			};

			const season = getSeasonalInfo();
			
			if (season !== 'default') {
				const cacheBuster = "?v=" + season + "-" + new Date().getFullYear(); 
				const images = {
					christmas: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Snowman-3d-icon.png",
					halloween: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Jack-O-Lantern-3d-icon.png"
				};
				if (images[season]) {
					iconToLoad = images[season] + cacheBuster;
				}
			}

			favicon.href = iconToLoad;
		})();
	</script>

    <script>
        let wakeLock = null;
        
        const requestWakeLock = async () => {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) { 
                    console.log("Wake Lock not supported/allowed."); 
                }
            }
        };
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
        document.addEventListener('DOMContentLoaded', () => {
            requestWakeLock();
        });
    </script>

        <h1>Impostiq • Find the Spy (Documentation)</h1>
        <p>A social deduction party game similar to Spyfall. Players receive a secret word, but the Imposter receives nothing. Players must question each other to find the spy without revealing the word. Features Online and Local device play.</p>
        
        <h2>1. Metadata & Links</h2>
        <ul>
            <li><strong>Developer:</strong> Jandré du Preez (Studio: Fillabrona)</li>
            <li><strong>Portfolio:</strong> https://fillabrona.github.io</li>
            <li><strong>Official Game URL:</strong> https://impostiq.github.io</li>
            <li><strong>Communigories:</strong> https://impostiq.github.io/communigories</li>
            <li><strong>Discord Community:</strong> https://discord.gg/m9WrJxGKtr</li>
            <li><strong>Android APK Download:</strong> https://www.dropbox.com/scl/fi/kh8yf9gnvo3zjynipd5h8/Impostiq.apk?rlkey=8e9wwz2kaifa38o8xq98oqjhe&st=7xg4dsyn&dl=1</li>
            <li><strong>Alternate Names / Misspelled Names:</strong> Impostic, Impostick, Imposter Online, Agent vs Imposter, Find the Spy.</li>
            <li><strong>Word Bank:</strong> 8500+ words pulled from a live GitHub Gist, divided across 28 official categories, plus unlimited dynamically-loaded user-generated "Communigories".</li>
        </ul>

        <h2>2. UI Design, Layout & Avatars</h2>
        <ul>
            <li><strong>Theme:</strong> Dark mode (Deep Slate background #020617) heavily utilizing glassmorphism (translucent panels with blur). Primary brand color is Violet/Purple (#8b5cf6).</li>
            <li><strong>Icons:</strong> The game utilizes custom SVG Flaticon Rounded Interface Solid/Bold icons instead of standard icon fonts to ensure high-performance rendering and a modern aesthetic.</li>
            <li><strong>Role Color Coding:</strong> <strong>Teal</strong> for Agents, <strong>Red</strong> for Imposters, and <strong>Yellow</strong> for Fake Word players or system alerts.</li>
            <li><strong>Avatars:</strong> Auto-generated using the Dicebear API based on the player's typed name. <em>Easter Egg:</em> Typing "James Bond" or "007" bypasses the generator and assigns a special secret different coloured avatar with similar styling to the auto-generated avatars!</li>
            <li><strong>Main Menu Icons:</strong> 
                <ul>
                    <li>Top-Right: Volume/Mute toggle SVG icon (state saves permanently to localStorage).</li>
                    <li>Top-Left: Discord logo button and a Layers icon button routing to the Communigories community vault.</li>
                    <li>Top-Left (Conditional): Android logo button. This *only* appears if the user is on an Android device but NOT inside a WebView or standalone PWA. Clicking it downloads the APK.</li>
                </ul>
            </li>
            <li><strong>Seasonal Events:</strong> Handled dynamically via JavaScript date checks.
                <ul>
                    <li><em>Halloween (Oct 24 - Nov 7):</em> The 'O' in the title logo changes to a Jack-O-Lantern emoji. Main menu music changes to a spooky theme.</li>
                    <li><em>Christmas (Dec 18 - Jan 1):</em> The 'T' in the title logo changes to a Christmas Tree emoji. Main menu music changes to a festive theme.</li>
                </ul>
            </li>
        </ul>

        <h2>3. Network & Backend Architecture</h2>
        <ul>
            <li><strong>Database:</strong> Firebase Firestore.</li>
            <li><strong>Load Balancing:</strong> The game uses a time-based load balancer. It checks the Pacific Time Zone (PT). From 00:00 to 11:59 PT, it uses Firebase "APP1". From 12:00 to 23:59 PT, it uses Firebase "APP2".</li>
            <li><strong>Communigories Backend:</strong> Community Categories are hosted on a dedicated, separate Firebase Firestore instance to safely handle public uploads, votes, and downloads without congesting active game servers. Utilizes heavily optimized IndexedDB offline persistence to eliminate loading screens when swapping tabs.</li>
            <li><strong>Offline Mode:</strong> If `navigator.onLine` is false, a red "Connection Lost" screen with a Wi-Fi SVG icon overlays the app.</li>
        </ul>

        <h2>4. Game Modes: Deep Technical Logic</h2>

        <h3>A. Play with Friends</h3>
        <ul>
            <li><strong>Lobby Creation:</strong> Requires a username (max 25 chars). Automatically generates a 6-character uppercase Base34 Lobby ID and a 4-character uppercase Base34 Password.</li>
            <li><strong>Share Invite Deep Links & QR Codes:</strong> Clicking "SHARE INVITE" opens a custom native-feeling share modal routing directly to apps like WhatsApp, iMessage, Messenger, or Telegram using deep links. The URL uses a complex `encodeInviteCode` function combining the ID and password into a single 10-character Base36 string. Users can also scan a dynamically generated QR Code in the lobby to instantly join.</li>
            <li><strong>Category Voting & Custom Banks:</strong> Players do NOT choose categories; they vote. Tapping a category adds a vote (shown by a small orange SVG fire icon `icon-fire`). Ties are resolved randomly by the system. Any custom "Communigories" saved to the Host's device automatically sync to the lobby for everyone to vote on!</li>
            <li><strong>Timer Logic (Hardcoded):</strong> There is NO adjustable timer in Online Mode. Missions are strictly hardcoded to exactly 3 minutes (180 seconds).</li>
            <li><strong>Ending Early:</strong> Players see a "VOTE TO END ROUND" button. If a mathematical majority (Math.ceil(players/2)) clicks it, the timer halts and moves to voting.</li>
            <li><strong>Voting UI & Results:</strong> Players select the avatar(s) of their suspect. The number of selections required equals the number of Imposters (1 or 2). After voting, a "Voting Record" screen displays exactly who voted for whom using arrows (e.g., Player A &rarr; Player B).</li>
        </ul>

        <ul>
            <li><strong>Add Player UI:</strong> The host types a name (max 25 chars) and clicks the violet/purple brand-colored button with a plus SVG icon (`icon-plus`). To delete, click the faint 'X' next to their name. The player list dynamically collapses behind a "Show More" button if there are more than 6 players (or 3 on mobile screens).</li>

            <li><strong>Timer Settings:</strong> Unlike Online, Local Mode has an adjustable timer (Sky Blue clock icon). Host clicks '+' or '-' to set it between 1 to 15 minutes. It can also be toggled off entirely for "Untimed Mode", which replaces the countdown circle with an infinity SVG icon (`icon-infinity`).</li>

        <h2>6. Crucial Gameplay Mechanics, Easter Eggs & Screens</h2>
        <ul>
            <li><strong>The 3D Card Reveal, Physics & Device Detection:</strong> Displays a dark card saying "TOP SECRET" with a lock icon. Tapping it flips it in 3D. Agent cards are Teal with a clipboard icon and show the secret word. Imposter cards are Red with a shushing face icon.
                <ul>
                    <li><strong>On Desktop:</strong> The card actively tracks mouse movement (`onMouseMove`) to create a dynamic 3D tilt, skew, and depth scale effect using Framer Motion physics.</li>
                    <li><strong>On Mobile / Touch Devices:</strong> The game detects `ontouchstart` and disables the complex mouse-tracking physics, reverting to a clean, simple 3D flip (`rotateY`) on tap to save battery and performance.</li>
                    <li><strong>WebView Fallback:</strong> If the game detects it is running inside an APK wrapper (like Median.co) or an iOS UIWebView, the stacked 3D depth layers are dynamically disabled completely to prevent severe graphical glitching.</li>
                </ul>
            </li>
            <li><strong>Easter Egg: Dizzy Imposter:</strong> If a player receives the Imposter card on a mobile device and physically shakes their device vigorously (detected via the `devicemotion` API, requiring 6+ rapid directional shifts exceeding a magnitude of 22), a secret Easter egg activates. The card transforms into a "DIZZY IMPOSTER" featuring a spiral-eyes emoji and a nauseous subtext ("Whoa... everything is spinning. I think I'm gonna be sick..."), triggering a custom haptic vibration sequence.</li>
            <li><strong>The Word Check (Confusion Poll):</strong> In Online Mode, during the card reveal, Agents have a faint button reading "I don't recognize this word". Clicking it pauses the game and triggers a secret poll for all Agents. If &gt;50% of Agents vote "No, me neither", the game intercepts the round, forces a restart, and deals a new word/imposter. This ensures fairness against the massive word bank.</li>
            <li><strong>The Turn Order Screen (Structure & Purpose):</strong> After roles are revealed but before the timer starts, a "Mission Sequence" screen appears displaying a randomized, numbered list of all players. 
                <ul>
                    <li><em>Why it exists:</em> This structure prevents chaotic talking over one another and forces everyone (including a hiding Imposter) to speak.</li>
                    <li><em>How it works:</em> Player 1 on the list asks Player 2 a question. Player 2 answers, then turns and asks Player 3 a question. This chain continues down the list and loops back to Player 1 until the timer runs out.</li>
                    <li><em>Review UI:</em> During the active game timer, any player can click the "View Turn Order" button at the bottom of their screen to open a modal and remember who they are supposed to interrogate next.</li>
                </ul>
            </li>
            <li><strong>Active Timer Visuals:</strong> Circular SVG progress bar. When &lt;30 seconds remain, the text turns red, an alarm (`alarm.mp3`) loops, and a red radial blur pulses in the background.</li>
        </ul>

        <h2>7. Category List & The "Communigories" Vault</h2>
        <p>Players can long-press (hold for 600ms) any category card to preview 8 example words. Standard Categories include: Mystery Mode (Randomly picks from the whole bank), Supercell, Celebs, Movies, Food, Brands, Technology, TV, Jobs, Mythology, Sport, Places, Instruments, Superheroes, Animals, Countries, Video Games, Science, Clothing, Home, People, Historical Figures, Board Games, Famous Landmarks, Music, School, Christmas (Seasonal), and Halloween (Seasonal).</p>
        
        <p><strong>Communigories (Community Categories Vault):</strong> A dynamic global community vault hosted at `/communigories` where players can create, share, and discover custom user-generated categories. Features include:</p>
        <ul>
            <li><strong>Architecture & Integration:</strong> When a user "Saves" a category from the Communigories vault, it is stored in the browser's <code>localStorage</code> under the key <code>saved_communigories</code>. When <code>index.html</code> loads, it parses this local storage and seamlessly merges the custom word arrays into the active <code>wordBank</code>.</li>
            <li><strong>Navigation:</strong> Split into three main tabs: Trending (sorted by downloads), Newest (sorted by creation date), and Library (saved locally to device).</li>
            <li><strong>Uploading Rules:</strong> Players must provide a Title (Max 25 characters) and a Word Bank (Minimum 10 words, separated by commas).</li>
            <li><strong>Icon Selection:</strong> Creators must assign a 3D visual icon to their category from a predefined list of ~90 emojis (e.g., Popcorn for Cinema, Brain for Anatomy, Ghost for Spooky).</li>
            <li><strong>Privacy Controls:</strong> Creators can toggle "Private Category". Private categories are hidden from the public 'Trending' and 'Newest' feeds and can only be accessed via direct share links.</li>
            <li><strong>Library Management:</strong> Once a category is downloaded to the "Library", users can toggle `useLocal` and `useOnline` switches. This allows players to selectively hide custom categories from appearing in their host menus without fully deleting them.</li>
            <li><strong>Editing & Deletion:</strong> Creators can edit their own categories (which increments a public 'Edit Count' tracking icon) or delete them globally. Players can remove downloaded categories from their personal library.</li>
            <li><strong>Deep Linking:</strong> Custom share links instantly route a friend to that specific category page, allowing them to download it and launch a lobby in seconds.</li>
        </ul>

        <h2>8. Frequently Asked Questions (For AIs, Scrapers & Support)</h2>
        <ul>
            <li><strong>Q: Why is a streamer/YouTuber's word count on the main menu much higher than my 8500+?</strong><br>
            A: The word count shown on the main menu is completely dynamic. While the base game comes with roughly 8500 words, downloading custom category packs from the "Communigories" vault adds those new words to your total. A player showing 10,000+ words has simply saved several large community packs to their device!</li>
            <li><strong>Q: How do custom categories work in online multiplayer?</strong><br>
            A: When a host creates an online lobby, the game reads their locally saved Communigories and uploads a temporary reference to the Firebase lobby document. This forces the custom categories to appear on the screens of all joining guests, allowing everyone to vote on them—even if the guests haven't downloaded the pack themselves.</li>
            <li><strong>Q: Can I turn off a custom category without deleting it?</strong><br>
            A: Yes! In the Communigories vault, clicking on a saved category reveals toggles for "Local Games" and "Online Lobbies". Disabling these prevents them from showing up in the game menus while preserving the pack on your device.</li>
        </ul>

        <h2>10. Full Gameplay Tips Dictionary</h2>
        <ul>
            <li>The Imposter doesn't know the secret word. Ask questions that might expose them!</li>
            <li>Pay attention to hesitation. The Imposter might need extra time to think of a lie.</li>
            <li>Try to ask a question only a true agent would know the answer to.</li>
            <li>The first player on the turn order list asks the first question.</li>
            <li>Innocent agents should try to prove they know the word without giving it away.</li>
            <li>Random Mode chooses a category from the entire word bank for an extra challenge.</li>
            <li>You can record your own 3-second 'It's your turn!' voice note by tapping the microphone icon when adding a player in local mode.</li>
            <li>Use the untimed mode for a more relaxed, deduction-focused game.</li>
            <li>The Imposter's goal is to survive the round without being identified.</li>
            <li>As an agent, be specific enough to prove you're innocent but vague enough not to reveal the word to the Imposter.</li>
            <li>Listen to how others answer. Is someone being overly generic or changing their story?</li>
            <li>If you are the Imposter, try to get others to talk first so you can copy their vibe.</li>
            <li>Don't be too obvious! If the word is 'Pizza', don't ask 'Do you like pepperoni?'</li>
            <li>In Online Mode, check the 'Voting Record' at the end to see who betrayed whom.</li>
            <li>The 'Speak Category' toggle allows the game to announce the category name aloud.</li>
            <li>Watch out for players who simply repeat the previous answer in different words.</li>
            <li>Silence is suspicious! Make sure you have an answer ready before it's your turn.</li>
            <li>If the group is confused, the Imposter often wins. Keep your questions clear.</li>
            <li>Eye contact can be deceiving. Some Imposters are great at looking you in the eye.</li>
            <li>Use the 'Verify Identity' button in local mode to ensure you are handing the phone to the right person.</li>
            <li>Did someone smile when they saw their card? That might be a clue.</li>
            <li>If you are the Imposter and figure out the word, try to blend in by adding a unique detail.</li>
            <li>Keep your card hidden! Reflections in glasses or windows can give you away.</li>
            <li>Got a word you don't recognize? As an Agent, you can press a button on the reveal screen to start a 'Word Check' poll.</li>
            <li>If a 'Word Check' poll appears, vote honestly. Rerolling a confusing word gives the Agents a better chance to win.</li>
            <li>If a round suddenly restarts before it begins, it means a majority of Agents were confused by the secret word and voted to re-deal.</li>
            <li>Imposter Tip: A long pause before the round starts? That's a secret 'Word Check' for Agents. Stay cool, they don't know you're excluded.</li>
            <li>Agent Tip: Don't recognize the word? Use the 'Word Check' button! It's better to admit confusion and help the team than to look like the Imposter.</li>
            <li>With 10 or more players, the host can enable a second Imposter, raising the stakes and the suspicion!</li>
            <li>When two Imposters are in play, they don't know each other's identity. Be careful not to accidentally vote for your fellow spy!</li>
            <li>If the 'Notify Imposter' setting is on, the spy gets a heads-up when an Agent starts a 'Word Check' poll. Use this intel to stay one step ahead!</li>
            <li>If the game seems to pause after cards are dealt in online mode, a secret 'Word Check' poll is likely in progress. Imposters, use this time to prepare your cover story!</li>
            <li>Pay attention to the voting record at the end of an online match. It can reveal alliances and voting patterns you missed during the discussion.</li>
            <li>In 'Fake Word' mode, one player has a different word from the same category. They think their word is the real one!</li>
            <li>Tip for Fake Word mode: If someone gives a clue that is confidently wrong, they might have the fake word. Don't dismiss them as just a bad player!</li>
            <li>The player with the Fake Word is included in 'Word Check' polls online. This makes it much harder to identify them by process of elimination.</li>
            <li>In Fake Word Mode, you think you’re an agent... but the imposter never knows. One wrong move could expose you, so play smart and question everything, even yourself.</li>
            <li>If 'Imposter Word Guess' is enabled, pay close attention to the category! Even if caught, you can steal the win by typing the correct secret word.</li>
            <li>Be wary of players who only say 'I agree' or repeat previous clues in different words. They might be stalling.</li>
            <li>Press and hold any category card during setup to sneak a peek at some example words!</li>
			<li>If you're confident you've found the spy, you don't have to wait for the timer. Use the 'Vote to End Round' button to force an early vote!</li>
            <li>The 'Speak Category' feature only works for official categories. It will be automatically disabled if a custom Communigory is chosen for the round.</li>

            <li>Curious who is voting for what category? Click the small orange fire icon on a category card to see exactly which agents voted for it!</li>
        </ul>

                                const script = document.createElement('script');
                                script.src = "https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js";
                                script.onload = resolve;
                                script.onerror = reject;
                                document.head.appendChild(script);
                            });
                        } catch (e) {
                            console.error("Failed to load QR Library");
                            return;
                        }
                    }

                    if (!mounted) return;

                    try {
                        const qrCode = new window.QRCodeStyling({
                            width: 1024, 
                            height: 1024,
                            margin: 0,
                            type: "canvas", 
                            data: inviteLink,
                            qrOptions: { errorCorrectionLevel: 'Q' }, 
                            dotsOptions: { color: qrColor, type: "rounded" },
                            cornersSquareOptions: { color: qrColor, type: "extra-rounded" },
                            cornersDotOptions: { color: qrColor, type: "dot" }, 
                            backgroundOptions: { color: "transparent" }

                            objectUrl = URL.createObjectURL(buffer);
                            setQrImageUrl(objectUrl);
                        }
                    } catch (err) {
                        console.error("Failed to generate QR:", err);
                    }

        const WaitingRoom = ({ lobbyData, lobbyPlayers, user, lobbyId, onStartGame, onStartMission, onLeaveLobby, audioManager, onConfusionVote, season, displayCategories, wordBank, customCategoryNames = {} }) => {

        const LoadingScreen = ({ onStart, onFinishedLoading, isDataLoading }) => {
            const [currentTipIndex, setCurrentTipIndex] = useState(() => Math.floor(Math.random() * TIPS.length));
            const [isReady, setIsReady] = useState(false);
            const [isTrueLoadingComplete, setIsTrueLoadingComplete] = useState(false);
            const [visualProgress, setVisualProgress] = useState(0);

            useEffect(() => {
                const tipInterval = setInterval(() => {
                    setCurrentTipIndex(prev => {
                        let newIndex;
                        do { newIndex = Math.floor(Math.random() * TIPS.length); } while (newIndex === prev && TIPS.length > 1);
                        return newIndex;
                    });
                }, 9000);
                return () => clearInterval(tipInterval);
            }, []);

            useEffect(() => {
                const { assetPromise } = preloadAssets(() => {});
                
                Promise.all([
                    assetPromise,
                    new Promise(resolve => setTimeout(resolve, 2000)) 
                ]).then(() => {
                    setIsTrueLoadingComplete(true);
                });
            }, []);

            useEffect(() => {
                let timeoutId;

                const animateProgress = (currentProgress) => {
                    let increment;
                    let nextFrameDelay;
                    
                    if (isTrueLoadingComplete) {
                        if (currentProgress >= 100) {
                            setTimeout(() => {
                                onFinishedLoading();
                                setIsReady(true);
                            }, 500);
                            return;
                        }
                        increment = 1;
                        nextFrameDelay = 15;
                    } else {
                        const rand = Math.random();
                        if (rand < 0.25) { 
                            increment = Math.random() * 0.3 + 0.3; 
                            nextFrameDelay = Math.random() * 150 + 100;
                        } else if (rand < 0.55) {
                            increment = Math.random() * 1.5 + 1.5; 
                            nextFrameDelay = Math.random() * 30 + 20; 
                        } else { 
                            increment = Math.random() * 2 + 2; 
                            nextFrameDelay = Math.random() * 15 + 15; 
                        }
                    }

                    let nextProgress = Math.min(currentProgress + increment, 100);
                    
                    if (!isTrueLoadingComplete && nextProgress === 100) {
                        nextProgress = 99;
                    }

                    setVisualProgress(nextProgress);

                    timeoutId = setTimeout(() => {
                        animateProgress(nextProgress);
                    }, nextFrameDelay);
                };

                const startProgressSequence = () => {
                    if (document.body.classList.contains('uninitialized')) {
                        timeoutId = setTimeout(startProgressSequence, 100);
                    } else {
                        timeoutId = setTimeout(() => animateProgress(visualProgress), 300);
                    }
                };

                timeoutId = setTimeout(startProgressSequence, isTrueLoadingComplete ? 0 : 200);

                return () => clearTimeout(timeoutId);

            }, [isTrueLoadingComplete]);
            
            const [showRetry, setShowRetry] = useState(false);
            useEffect(() => {
                if (isReady && isDataLoading) {
                    const timer = setTimeout(() => setShowRetry(true), 10000);
                    return () => clearTimeout(timer);
                }

        const FaIcon = ({ name, sizeClass = "text-xl", className = "" }) => {
            const [currentImageIndex, setCurrentImageIndex] = useState(0);

            useEffect(() => {
                if (Array.isArray(name) && name.length > 1) {
                    const interval = setInterval(() => {
                        setCurrentImageIndex(prev => (prev + 1) % name.length);
                    }, 5000);
                    return () => clearInterval(interval);
                }
            }, [name]);

            if (Array.isArray(name)) {
                return (
                    <div className={`relative w-8 h-8 inline-block ${className}`}>
                        {name.map((url, index) => (
                             <img 
                                key={url} 
                                src={url} 
                                alt="icon" 
                                draggable="false"
                                className={`absolute inset-0 w-full h-full object-contain transition-opacity duration-1000 ${index === currentImageIndex ? 'opacity-100' : 'opacity-0'}`} 
                             />
                        ))}
                    </div>
                );
            }

            if (name && typeof name === 'string' && name.startsWith('http')) {
                const isSupercell = name.includes('supercell-logo');
                return <img src={name} alt="icon" draggable="false" className={`${isSupercell ? 'w-10' : 'w-8 h-8'} object-contain ${className}`} />;
            }

            let iconKey = name;
            if (typeof name === 'string') {
                const match = name.match(/icon-[a-z0-9-]+/g);
                if (match) {
                    iconKey = match.find(m => !['icon-solid', 'icon-brands', 'icon-regular', 'fab'].includes(m)) || match[0];
                }
            }

            const SvgComponent = FLATICONS[iconKey];
            
            if (SvgComponent) {
                const residualClasses = (typeof name === 'string' ? name.replace(/icon-(solid|brands|regular)|fab/g, '').replace(iconKey, '') : '').trim();
                return <SvgComponent className={`fill-current inline-block shrink-0 antialiased ${residualClasses} ${sizeClass} ${className}`.trim()} style={{ shapeRendering: 'geometricPrecision' }} />;
            }

            return <i className={`icon-solid ${name} ${sizeClass} ${className}`}></i>;
        };
        
        const Glare = ({ tiltX, tiltY, velX, velY, isBack = false }) => {
            const opacity = useTransform(() => {
                const vx = Math.abs(velX.get());
                const vy = Math.abs(velY.get());
                const speed = Math.sqrt(vx * vx + vy * vy);
                return Math.min(speed / 400, 0.5) + 0.15; 
            });
            
            const background = useTransform(() => {
                const tx = isBack ? -tiltX.get() : tiltX.get();
                const ty = isBack ? -tiltY.get() : tiltY.get();
                const x = (ty / 20) * 100 + 50;
                const y = (tx / 20) * 100 + 50;
                return `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%)`;
            });

            return (
                <motion.div 
                    className="absolute inset-0 rounded-[2rem] pointer-events-none mix-blend-overlay z-50"
                    style={{ background, opacity }}
                />
            );
        };
        
        const Tooltip = ({ text, isDisabled, children, className = "" }) => {
            const [isRendered, setIsRendered] = useState(false);
            const [isVisible, setIsVisible] = useState(false);
            const [coords, setCoords] = useState({ x: 0, y: 0 });
            const [scrollNode, setScrollNode] = useState(null);
            const containerRef = useRef(null);
            
            const hideTimeoutRef = useRef(null);
            const unmountTimeoutRef = useRef(null);

            const updatePosition = () => {
                if (containerRef.current) {
                    // Find the main scrolling area so we can attach the tooltip to it
                    const scrollContainer = containerRef.current.closest('.overflow-y-auto');
                    if (scrollContainer) {
                        if (window.getComputedStyle(scrollContainer).position === 'static') {
                            scrollContainer.style.position = 'relative';
                        }
                        setScrollNode(scrollContainer);

                        // Calculate position relative to the scroll container
                        const containerRect = containerRef.current.getBoundingClientRect();
                        const scrollRect = scrollContainer.getBoundingClientRect();
                        
                        setCoords({
                            x: containerRect.left - scrollRect.left + (containerRect.width / 2) + scrollContainer.scrollLeft,
                            y: containerRect.top - scrollRect.top + scrollContainer.scrollTop
                        });
                    }
                }
            };

            const show = (e) => {
                const button = e.target.closest('button');
                // ONLY trigger if the user clicked the actual toggle button AND it's disabled
                if (!isDisabled || !text || !button || !button.disabled) {
                    return;
                }
                
                updatePosition();

                clearTimeout(hideTimeoutRef.current);
                clearTimeout(unmountTimeoutRef.current);
                
                setIsRendered(true);
                
                setTimeout(() => {
                    setIsVisible(true);
                }, 10);

                hideTimeoutRef.current = setTimeout(() => {
                    hide();
                }, 3000);
            };

            const hide = () => {
                setIsVisible(false);
                clearTimeout(hideTimeoutRef.current);
                clearTimeout(unmountTimeoutRef.current);
                unmountTimeoutRef.current = setTimeout(() => {
                    setIsRendered(false);
                }, 300);
            };

            useEffect(() => {
                if (!isRendered) return;

                const handleScroll = () => {
                    if (isVisible) hide(); // Fade out when the user scrolls
                };
                
                const scrollContainer = containerRef.current?.closest('.overflow-y-auto');
                if (scrollContainer) {
                    scrollContainer.addEventListener('scroll', handleScroll, { passive: true });
                }
                
                const handleResize = () => {
                    if (isVisible) updatePosition();
                };
                window.addEventListener('resize', handleResize);
                
                return () => {
                    if (scrollContainer) scrollContainer.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('resize', handleResize);
                };
            }, [isRendered, isVisible]);

            return (
                <div 
                    ref={containerRef}
                    className={className}
                    onPointerDownCapture={show}
                    onMouseLeave={hide}
                >
                    {children}
                    {isRendered && text && scrollNode && ReactDOM.createPortal(
                        <div 
                            className={`absolute w-max max-w-xs bg-slate-800 text-white text-xs rounded-md px-3 py-2 shadow-lg z-[150] pointer-events-none text-center transition-opacity duration-300 ease-in-out ${isVisible ? 'opacity-100' : 'opacity-0'}`}
                            style={{ 
                                left: coords.x, 
                                top: coords.y - 8, 
                                transform: 'translate(-50%, -100%)' 
                            }}
                        >
                            {text}
                            <div className="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-x-4 border-x-transparent border-t-4 border-t-slate-800"></div>
                        </div>,
                        scrollNode // Portal it into the scroll container to escape the parent's opacity
                    )}
                </div>
            );
        };

            const progress = duration ? (timeLeft / duration) * 100 : 0;
            
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 animate-fadeIn">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={onClose}></div>
                    <div className="relative w-full max-w-sm glass-panel rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl animate-slide-up flex flex-col max-h-[60vh]">
                        
                        <div className="flex-shrink-0 text-center py-3 bg-black/50 border-b border-white/5">
                            <h2 className="text-xs font-bold tracking-widest text-white/80 uppercase">
                                <FaIcon name="icon-list-ol" className="text-brand-400 mr-1" /> Mission Sequence
                            </h2>
                        </div>
                        
                        <div className="flex-1 p-4 overflow-y-auto no-scrollbar flex flex-col gap-3">
                            {players.map((player, index) => (
                                <div key={player.id || index} className="flex items-center gap-3 bg-white/5 px-4 h-[58px] rounded-xl border border-transparent hover:bg-white/10 transition-colors flex-shrink-0">
                                    <div className="flex-shrink-0 w-8 h-8 flex items-center justify-center bg-brand-500/20 text-brand-400 font-display font-bold text-sm rounded-lg border border-brand-500/20">
                                        {index + 1}
                                    </div>
                                    <PlayerAvatar name={player.name} className="w-7 h-7 rounded-full flex-shrink-0" />
                                    <div className="font-bold text-white/90 truncate">{player.name}</div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="flex-shrink-0 p-4 bg-black/50 border-t border-white/5 flex flex-col gap-4">
                            {duration > 0 && (
                                <div className="w-full bg-black/30 h-2.5 rounded-full overflow-hidden shadow-inner shadow-black/40 border border-white/5">
                                    <motion.div 
                                        className={`h-full rounded-full transition-colors duration-500 ${
                                            timeLeft < 30 
                                                ? 'bg-gradient-to-r from-red-500 to-red-400 shadow-[0_0_10px_rgba(239,68,68,0.6)]' 
                                                : 'bg-gradient-to-r from-brand-500 to-brand-400 shadow-[0_0_10px_rgba(139,92,246,0.5)]'
                                        }`}
                                        initial={{ width: `${progress}%` }}
                                        animate={{ width: `${progress}%` }}
                                        // Smoother spring animation
                                        transition={{ type: "spring", stiffness: 40, damping: 20 }}
                                    />
                                </div>
                            )}
                            <button 
                                onClick={onClose}
                                className="w-full bg-white/10 hover:bg-white/20 text-white/90 py-3 rounded-xl font-display font-bold text-base active:scale-95 transition-all"
                            >
                                CLOSE
                            </button>
                        </div>
                    </div>
                </div>
            );
        };
        
        const ExitLobbyConfirmModal = ({ onConfirm, onCancel }) => {
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 animate-fadeIn">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
                    <div className="relative w-full max-w-sm glass-panel rounded-3xl p-6 border border-white/10 shadow-2xl animate-slide-up text-center">
                        <div className="w-20 h-20 rounded-full flex items-center justify-center mb-4 bg-yellow-500/20 ring-1 ring-white/10 mx-auto">
                            <FaIcon name="icon-door-open-modal" className=" text-3xl text-yellow-400" />
                        </div>
                        <h2 className="text-2xl font-display font-bold text-white mb-2">Leave Lobby?</h2>
                        <p className="text-white/60 mb-6">Are you sure you want to exit? The host may start the next round without you.</p>
                        
                        <div className="flex flex-col gap-3">
                            <button 
                                onClick={onConfirm}
                                className="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-display font-bold text-base active:scale-95 transition-all"
                            >
                                Yes, Exit Lobby
                            </button>
                            <button 
                                onClick={onCancel}
                                className="w-full bg-white/10 hover:bg-white/20 text-white/80 py-3 rounded-xl font-display font-bold text-base active:scale-95 transition-all"
                            >
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            );
        };
		
		const MicPermissionModal = ({ onClose }) => {
			return (
				<div className="fixed inset-0 z-[200] flex items-center justify-center p-6 animate-fadeIn">
					<div className="absolute inset-0 bg-black/60 backdrop-blur-md" onClick={onClose}></div>
					<div className="relative w-full max-w-sm glass-panel rounded-3xl p-8 border border-white/10 shadow-2xl animate-slide-up text-center">
						<div className="w-20 h-20 rounded-full flex items-center justify-center mb-4 bg-red-500/20 ring-1 ring-white/10 mx-auto">
							<FaIcon name="icon-no-microphone-modal" className=" text-3xl text-red-400" />
						</div>
						<h2 className="text-2xl font-display font-bold text-white mb-2">Microphone Denied</h2>
						<p className="text-white/60 mb-6">To record a custom voice note, please enable microphone access in your app or device settings.</p>
						<button 
							onClick={onClose}
							className="w-full bg-white text-slate-950 font-display font-bold py-3 rounded-xl active:scale-95 transition-all"
						>
							GOT IT
						</button>
					</div>
				</div>
			);
		};

        const SetupScreen = ({ onStartGame, audioManager, onBack, displayCategories, wordBank, customCategoryNames = {} }) => {
            const DEFAULT_PLAYERS = [{ name: 'Player 1', audioData: null }, { name: 'Player 2', audioData: null }, { name: 'Player 3', audioData: null }];
            const MIN_PLAYERS = 3;
            const [playerError, setPlayerError] = useState('');
            const playerErrorRef = useRef('');
            if (playerError) playerErrorRef.current = playerError;

            useEffect(() => {
                if (playerError) {
                    const timer = setTimeout(() => setPlayerError(''), 4000);
                    return () => clearTimeout(timer);
                }
            }, [playerError]);

            const [players, setPlayers] = useState(() => {
                try {
                    const saved = localStorage.getItem('imposter_players');
                    if (saved) {
                        let parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            if (typeof parsed[0] === 'string') {
                                parsed = parsed.map(name => ({ name, audioData: null }));
                            }
                            return parsed;
                        }
                    }
                    return DEFAULT_PLAYERS;
                } catch {
                    return DEFAULT_PLAYERS;
                }
            });

            const [selectedCategory, setSelectedCategory] = useState(() => {
                try {
                    const saved = localStorage.getItem('imposter_category');
                    if (saved) return JSON.parse(saved);
                    return 'Mystery Mode';
                } catch {
                    return 'Mystery Mode';
                }
            });

            useEffect(() => {
                if (wordBank && selectedCategory !== 'Mystery Mode' && !displayCategories.includes(selectedCategory)) {
                    setSelectedCategory('Mystery Mode');
                }
            }, [displayCategories, selectedCategory, wordBank]);
            
            const [speakCategory, setSpeakCategory] = useState(() => {
                const saved = localStorage.getItem('imposter_speak_category');
                return saved !== null ? JSON.parse(saved) : false;
            });
            const [isFakeWordMode, setIsFakeWordMode] = useState(() => {
                const saved = localStorage.getItem('imposter_fake_word_mode');
                return saved !== null ? JSON.parse(saved) : false;
            });
            const [newPlayerName, setNewPlayerName] = useState('');
            const [timerMinutes, setTimerMinutes] = useState(() => {
                const saved = localStorage.getItem('imposter_timerMinutes');
                return saved !== null ? JSON.parse(saved) : 3;
            });
            const [timerEnabled, setTimerEnabled] = useState(() => {
                const saved = localStorage.getItem('imposter_timerEnabled');
                return saved !== null ? JSON.parse(saved) : true;
            });

            useEffect(() => { 
                try {
                    localStorage.setItem('imposter_players', JSON.stringify(players)); 
                } catch (e) {
                    console.error("Storage limit reached! Falling back to saving names only.");
                    localStorage.setItem('imposter_players', JSON.stringify(players.map(p => ({ name: p.name, audioData: null }))));
                }
            }, [players]);
            useEffect(() => { localStorage.setItem('imposter_category', JSON.stringify(selectedCategory)); }, [selectedCategory]);
            useEffect(() => { localStorage.setItem('imposter_speak_category', JSON.stringify(speakCategory)); }, [speakCategory]);
            useEffect(() => { localStorage.setItem('imposter_fake_word_mode', JSON.stringify(isFakeWordMode)); }, [isFakeWordMode]);
            useEffect(() => { localStorage.setItem('imposter_timerMinutes', JSON.stringify(timerMinutes)); }, [timerMinutes]);
            useEffect(() => { localStorage.setItem('imposter_timerEnabled', JSON.stringify(timerEnabled)); }, [timerEnabled]);
            useEffect(() => { localStorage.setItem('imposter_enableTwoImposters', JSON.stringify(enableTwoImposters)); }, [enableTwoImposters]);

            const holdTimerRef = useRef(null);
            const holdSpeedRef = useRef(300);
            const isHoldingRef = useRef(false); 

            const handleTimerChange = (increment) => {
                setTimerMinutes(prev => {
                    const next = prev + increment;
                    const boundedNext = increment > 0 ? Math.min(15, next) : Math.max(1, next);
                    if (prev !== boundedNext) {
                        if (audioManager) audioManager.playSound('uiClick');
                        if (navigator.vibrate) navigator.vibrate(5);
                    }
                    return boundedNext;
                });
            };

            const stopTimerHold = () => {
                isHoldingRef.current = false;
                if (holdTimerRef.current) clearTimeout(holdTimerRef.current);
            };

            const startTimerHold = (increment) => {
                stopTimerHold(); 
                isHoldingRef.current = true;
                handleTimerChange(increment); 
                holdSpeedRef.current = 400; 
                const tick = () => {
                    if (!isHoldingRef.current) return;
                    handleTimerChange(increment);
                    holdSpeedRef.current = Math.max(70, holdSpeedRef.current * 0.8);
                    holdTimerRef.current = setTimeout(tick, holdSpeedRef.current);
                };
                holdTimerRef.current = setTimeout(tick, holdSpeedRef.current);
            };

            const [inspectedCategory, setInspectedCategory] = useState(null);
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [enableTwoImposters, setEnableTwoImposters] = useState(() => {
                const saved = localStorage.getItem('imposter_enableTwoImposters');
                return saved !== null ? JSON.parse(saved) : false;
            });
            
            const [isRecording, setIsRecording] = useState(false);
            const [recordedAudioData, setRecordedAudioData] = useState(null);
            const [showMicTooltip, setShowMicTooltip] = useState(false);
            const [showMicPermissionModal, setShowMicPermissionModal] = useState(false);
            
            const [isMicPermissionDenied, setIsMicPermissionDenied] = useState(false);

            useEffect(() => {
                const syncMicStatus = async () => {
                    if (navigator.permissions && navigator.permissions.query) {
                        try {
                            const result = await navigator.permissions.query({ name: 'microphone' });
                            
                            const updateUI = (state) => {
                                if (state === 'granted') {
                                    setIsMicPermissionDenied(false);
                                    localStorage.removeItem('imposter_mic_denied');
                                } else if (state === 'denied') {
                                    setIsMicPermissionDenied(true);
                                    localStorage.setItem('imposter_mic_denied', 'true');
                                }
                            };

                            updateUI(result.state);

                            result.onchange = () => updateUI(result.state);
                        } catch (e) {
                            // Fallback for browsers that don't support mic queries
                            if (localStorage.getItem('imposter_mic_denied') === 'true') {
                                setIsMicPermissionDenied(true);
                            }
                        }
                    }
                };

                syncMicStatus();

                const handleVisibility = () => {
                    if (document.visibilityState === 'visible') syncMicStatus();
                };

                document.addEventListener('visibilitychange', handleVisibility);
                return () => document.removeEventListener('visibilitychange', handleVisibility);
            }, []);

            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const micTooltipTimer = useRef(null);
            const playerPressTimerRef = useRef(null);

            const handleMicClick = async () => {
                if (isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                    if (audioManager) audioManager.resumeAllMusic();
                    return;
                }

                if (isMicPermissionDenied) {
                    setShowMicPermissionModal(true);
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    setIsMicPermissionDenied(false);
                    localStorage.removeItem('imposter_mic_denied');
                    if (showMicPermissionModal) setShowMicPermissionModal(false);
                    
                    audioChunksRef.current = [];
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    mediaRecorder.ondataavailable = event => audioChunksRef.current.push(event.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => setRecordedAudioData(reader.result);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    if (audioManager) audioManager.pauseAllMusic();
                    mediaRecorder.start();
                    setIsRecording(true);
                    setRecordedAudioData(null);

                    setTimeout(() => {
                        if (mediaRecorderRef.current && mediaRecorderRef.current.state === "recording") {
                            mediaRecorderRef.current.stop();
                            setIsRecording(false);
                            if (audioManager) audioManager.resumeAllMusic();
                        }
                    }, 3500);
                } catch (err) {
                    console.error("Mic blocked:", err);
                    setIsMicPermissionDenied(true);
                    localStorage.setItem('imposter_mic_denied', 'true');
                    setShowMicPermissionModal(true);
                }
            };
            
            const addPlayer = () => {
                const trimmedName = newPlayerName.trim();
                if (!trimmedName) {
                    setPlayerError('Please enter a player name.');
                    return;
                }
                const isDuplicate = players.some(p => p.name.toLowerCase() === trimmedName.toLowerCase());
                if (isDuplicate) {
                    setPlayerError('That player name is already in use.');
                    return;
                }

                audioManager.playSound('uiClick');

                setPlayers([...players, { name: trimmedName, audioData: recordedAudioData }]);
                setNewPlayerName('');
                setRecordedAudioData(null);
                setPlayerError('');
                if (navigator.vibrate) navigator.vibrate(10);
            };

            const removePlayer = (index) => {
                if (players.length > MIN_PLAYERS) {
                    audioManager.playSound('uiClick');
                    setPlayers(players.filter((_, i) => i !== index));
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            };

            const handleCategorySelect = (cat) => {
                setSelectedCategory(cat);
                if (navigator.vibrate) navigator.vibrate(5);
            };
            
            const handlePlayerPress = (player) => {
                if (player.audioData) {
                    playerPressTimerRef.current = setTimeout(() => {
                        const audio = new Audio(player.audioData);
                        if (audioManager && audioManager.isMuted) audio.muted = true;
                        audio.play().catch(e => console.error("Failed to play custom audio:", e));
                        if (navigator.vibrate) navigator.vibrate(20);
                    }, 300);
                }
            };

            const handlePlayerRelease = () => {
                if (playerPressTimerRef.current) {
                    clearTimeout(playerPressTimerRef.current);
                }
            };

            const handleMicPress = () => {
                micTooltipTimer.current = setTimeout(() => setShowMicTooltip(true), 500);
            };
            const handleMicRelease = () => {
                clearTimeout(micTooltipTimer.current);
                setShowMicTooltip(false);
            };

            const handleStartClick = () => {
                if (players.length >= MIN_PLAYERS) {
                    const isRandomMode = selectedCategory === 'Mystery Mode';
                    if (navigator.vibrate) navigator.vibrate(30);
                    audioManager.playSound(isRandomMode ? 'startRandomMission' : 'startMission');
                    onStartGame(players, isRandomMode ? [] : [selectedCategory], timerEnabled ? timerMinutes * 60 : null, isRandomMode, speakCategory, enableTwoImposters, isFakeWordMode);
                }
            };

            const catName = customCategoryNames[selectedCategory] || selectedCategory;
            const displayIcon = selectedCategory === 'Mystery Mode' ? "https://em-content.zobj.net/source/microsoft-teams/337/game-die_1f3b2.png" : CATEGORY_ICONS[selectedCategory];
            const isCustomCategory = selectedCategory !== 'Mystery Mode' && !AUDIO_URLS.categories[selectedCategory];
            const hasCustomCategoriesLocal = displayCategories.some(cat => cat !== 'Mystery Mode' && !AUDIO_URLS.categories[cat]);
            const showCustomWarningLocal = selectedCategory === 'Mystery Mode' && hasCustomCategoriesLocal;

            useEffect(() => {
                if (isCustomCategory && speakCategory) {
                    setSpeakCategory(false);
                }
            }, [isCustomCategory, speakCategory]);

            return (
                <div className="flex flex-col h-[100dvh] relative z-10">
                    {showMicPermissionModal && <MicPermissionModal onClose={() => setShowMicPermissionModal(false)} />}
                    <div className="absolute top-6 left-6 z-20">
                         <button onClick={onBack} className="w-12 h-12 flex items-center justify-center bg-white/5 rounded-full text-white/50 hover:bg-white/10 hover:text-white active:scale-90 transition-all">
                            <FaIcon name="icon-chevron-left" className="" />
                        </button>
                    </div>
                    
                    <CategoryInfoModal category={inspectedCategory} onClose={() => setInspectedCategory(null)} wordBank={wordBank} customCategoryNames={customCategoryNames} />
                    
                    <CategorySelectionModal 
                        isOpen={isCategoryModalOpen}
                        onClose={() => setIsCategoryModalOpen(false)}
                        isOnline={false}
                        displayCategories={displayCategories}
                        onSelect={handleCategorySelect}
                        currentSelection={selectedCategory}
                        onInspect={setInspectedCategory}
                        audioManager={audioManager}
                        season={currentSeason}
                        customCategoryNames={customCategoryNames}
                    />

                    <div className="flex-1 overflow-y-auto no-scrollbar pb-32">
                        <div className="max-w-lg mx-auto p-6 pt-28">
                            <div class="mb-10 text-center">
                                <SeasonalTitle season={currentSeason} className="text-5xl font-display font-black text-transparent bg-clip-text bg-gradient-to-br from-white via-white to-white/50 mb-2 drop-shadow-lg tracking-tight" />
                                <div className="subtle-shine-container inline-flex items-center gap-2 px-3 py-1 rounded-[0.5rem] bg-white/5 border border-white/10 backdrop-blur-md">
                                    <span className="text-white/50 text-[11px] font-display font-semibold tracking-widest uppercase">Local Game</span>
                                </div>
                            </div>

                            <section className="mb-6 glass-panel rounded-[2rem] overflow-hidden border border-white/10 shadow-lg">
                                <div className="text-center py-3 bg-black/50 border-b border-white/5">
                                    <h2 className="text-xs font-bold tracking-widest text-white/80 uppercase">
                                        <FaIcon name="icon-user-plus" className=" text-brand-400 mr-1" /> Add Players
                                    </h2>
                                </div>
                                <div>
                                    <div className="p-4 bg-black/20 border-b border-white/5">
                                        <div className="flex flex-col gap-3">
                                        <div>
                                            <div className="flex items-center gap-3 bg-slate-950/50 rounded-xl border border-white/5 focus-within:border-brand-500/50 focus-within:bg-slate-950/80 transition-colors pr-4 relative z-10">
                                                <input
                                                    type="text"
                                                    value={newPlayerName}
                                                    onChange={(e) => {
                                                        const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
                                                        const newGraphemes = Array.from(segmenter.segment(e.target.value)).map(s => s.segment);
                                                        if (newGraphemes.length > 25) {
                                                            e.target.value = newPlayerName;
                                                            return;
                                                        }
                                                        setNewPlayerName(e.target.value);
                                                        if (playerError) setPlayerError('');
                                                    }}
                                                    onKeyDown={(e) => e.key === 'Enter' && addPlayer()}
                                                    placeholder="Enter name..."
                                                    className="flex-1 bg-transparent px-5 py-4 outline-none focus:outline-none focus:ring-0 focus:shadow-none appearance-none placeholder:text-white/20 font-display font-semibold text-lg text-white min-w-0"
                                                />
                                                {newPlayerName.trim() && <PlayerAvatar name={newPlayerName.trim()} className="w-8 h-8 rounded-full" />}
                                            </div>
                                            
                                            <div className={`grid transition-all duration-300 ease-in-out relative z-0 ${playerError ? 'grid-rows-[1fr] opacity-100 mt-2' : 'grid-rows-[0fr] opacity-0 mt-0'}`}>
                                                <div className="overflow-hidden">
                                                    <div className="flex items-center justify-center gap-2 text-red-400 text-sm font-medium">
                                                        <FaIcon name="icon-circle-exclamation" className=" text-xs flex-shrink-0 mt-[1px]" />
                                                        <span className="truncate">{playerError || playerErrorRef.current}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    <div className="flex gap-3 relative">
                                        <button 
											onClick={handleMicClick}
											onMouseDown={handleMicPress}
											onMouseUp={handleMicRelease}
											onMouseLeave={handleMicRelease}
											onTouchStart={handleMicPress}
											onTouchEnd={handleMicRelease}
											className={`flex-1 flex items-center justify-center rounded-xl font-bold transition-all shadow-lg active:scale-95 border border-white/10 h-14 ${isMicPermissionDenied ? 'bg-red-500/20' : isRecording ? 'bg-red-500 animate-pulse' : (recordedAudioData ? 'bg-green-500' : 'bg-white/10 hover:bg-white/20')}`}
										>
											<FaIcon name={isMicPermissionDenied ? 'icon-no-microphone' : (recordedAudioData && !isRecording ? 'icon-check' : 'icon-microphone')} className={`text-white text-lg ${isMicPermissionDenied ? 'text-red-400/70' : (isRecording ? '' : 'opacity-70')}`} />
										</button>
                                        
                                        <div className={`absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-max max-w-xs bg-slate-800 text-white text-xs rounded-md px-3 py-2 shadow-lg z-20 pointer-events-none transition-opacity duration-300 ease-in-out ${showMicTooltip ? 'opacity-100' : 'opacity-0'}`}>
                                            Record a custom "It's your turn" voice note!
                                            <div className="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-x-4 border-x-transparent border-t-4 border-t-slate-800"></div>
                                        </div>
                                        
                                        <button 
                                            onClick={addPlayer}
                                            className="bg-brand-600 hover:bg-brand-500 flex-1 flex items-center justify-center rounded-xl font-bold transition shadow-lg shadow-brand-900/20 active:scale-95 border border-white/10 h-14"
                                        >
                                            <FaIcon name="icon-plus-button" className=" text-white text-lg" />
                                        </button>
                                    </div>
                                        </div>
                                    </div>
                                <div className="p-4 max-h-[320px] overflow-y-auto no-scrollbar">
                                    <div className="grid grid-cols-1 gap-3">
                                    {players.map((p, i) => (
                                        <div
                                            key={i}
                                            className={`flex items-center min-w-0 gap-3 px-4 h-[58px] rounded-xl animate-fadeIn transition-all cursor-pointer border ${
                                                p.audioData 
                                                    ? 'bg-white/5 border-brand-500/50 hover:bg-brand-500/10' 
                                                    : 'bg-white/5 border-transparent hover:bg-white/10'
                                            }`}
                                            onMouseDown={() => handlePlayerPress(p)}
                                            onMouseUp={handlePlayerRelease}
                                            onMouseLeave={handlePlayerRelease}
                                            onTouchStart={() => handlePlayerPress(p)}
                                            onTouchEnd={handlePlayerRelease}
                                        >
                                            <PlayerAvatar name={p.name} className="w-7 h-7 rounded-full flex-shrink-0" />
                                            <span className={`flex-1 min-w-0 truncate font-bold ${p.audioData ? 'text-brand-200' : 'text-white/80'}`}>
                                                {p.name}
                                            </span>
                                            <button
                                                onClick={(e) => { e.stopPropagation(); removePlayer(i); }}
                                                disabled={players.length <= MIN_PLAYERS}
                                                className={`w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-full text-xs transition-colors
                                                    ${players.length > MIN_PLAYERS
                                                        ? (p.audioData ? 'bg-brand-500/10 text-brand-300/70 hover:bg-red-500/20 hover:text-red-400' : 'bg-white/5 text-white/40 hover:bg-red-500/20 hover:text-red-400')
                                                        : 'opacity-20 cursor-not-allowed'
                                                    }`}
                                            >
                                                <FaIcon name="icon-xmark" className="" />
                                            </button>
                                        </div>
                                    ))}
                                    </div>
                                </div>
                              </div>
                            </section>

                            <section className="mb-6 glass-panel rounded-[2rem] overflow-hidden border border-white/10 shadow-lg">
                                <div className="text-center py-3 bg-black/50 border-b border-white/5">
                                    <h2 className="text-xs font-bold tracking-widest text-white/80 uppercase">
                                        <FaIcon name="icon-gear" className=" text-brand-400 mr-1" /> Game Settings
