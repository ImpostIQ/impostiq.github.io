        (function() {
            const getSeasonalInfo = () => {
                const now = new Date();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                
                if ((month === 10 && day >= 24) || (month === 11 && day <= 7)) {
                    return 'halloween';
                }

                if ((month === 12 && day >= 18) || (month === 1 && day <= 1)) {
                    return 'christmas';
                }
                
                return 'default';
            };

            const season = getSeasonalInfo();
            
            const cacheBuster = "?v=" + season + "-" + new Date().getFullYear(); 

            const images = {
                christmas: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Snowman-3d-icon.png",
                halloween: "https://icons.iconarchive.com/icons/microsoft/fluentui-emoji-3d/1024/Jack-O-Lantern-3d-icon.png"
            };

            if (images[season]) {
                const imageUrl = images[season] + cacheBuster;
                
                const favicon = document.querySelector('link[rel="icon"]');
                const ogImage = document.getElementById('og-image');
                const twitterImage = document.getElementById('twitter-image');

                if (favicon) {
                    favicon.href = imageUrl;
                    document.head.removeChild(favicon);
                    document.head.appendChild(favicon);
                }
            }
        })();

	<script>
		let wakeLock = null;
		
		const requestWakeLock = async () => {
			if ('wakeLock' in navigator) {
				try {
					wakeLock = await navigator.wakeLock.request('screen');
				} catch (err) { 
					console.log("Wake Lock not supported/allowed."); 
				}
			}
		};
		document.addEventListener('visibilitychange', () => {
			if (document.visibilityState === 'visible') {
				requestWakeLock();
			}
		});
		document.addEventListener('DOMContentLoaded', () => {
			requestWakeLock();
		});
	</script>

		const TIPS = [

			const [currentTipIndex, setCurrentTipIndex] = useState(() => Math.floor(Math.random() * TIPS.length));

			const [isTrueLoadingComplete, setIsTrueLoadingComplete] = useState(false);

				const tipInterval = setInterval(() => {
					setCurrentTipIndex(prev => {
						let newIndex;
						do { newIndex = Math.floor(Math.random() * TIPS.length); } while (newIndex === prev && TIPS.length > 1);
						return newIndex;
					});
				}, 5000);
				return () => clearInterval(tipInterval);
			}, []);

			useEffect(() => {
				const { assetPromise } = preloadAssets(() => {});

					assetPromise,
					new Promise(resolve => setTimeout(resolve, 4000)) 
				]).then(() => {
					setIsTrueLoadingComplete(true);
				});
			}, []);

			useEffect(() => {
				let timeoutId;

				const animateProgress = (currentProgress) => {
					if (isTrueLoadingComplete) {
						return;
					}

					let increment;
					let nextFrameDelay;
					
					const rand = Math.random();
					if (rand < 0.12) {
						increment = Math.random() * 9 + 1; 
						nextFrameDelay = Math.random() * 100 + 80;
					} else if (rand < 0.22) {
						increment = Math.random() * 0.5 + 0.1; 
						nextFrameDelay = Math.random() * 150 + 100;
					} else {
						increment = Math.random() * 1.5 + 0.8;
						nextFrameDelay = Math.random() * 40 + 20;
					}

					let nextProgress = Math.min(currentProgress + increment, 99);

					setVisualProgress(nextProgress);

					timeoutId = setTimeout(() => {
						animateProgress(nextProgress);
					}, nextFrameDelay);
				};

				if (isTrueLoadingComplete) {
					clearTimeout(timeoutId);
					setVisualProgress(100); 
					
					setTimeout(() => {
						onFinishedLoading();
						setIsReady(true);
					}, 700);

				} else {
					timeoutId = setTimeout(() => {
						animateProgress(visualProgress);
					}, 400);
				}

		const Glare = ({ tiltX, tiltY, velX, velY, isBack = false }) => {
            const opacity = useTransform(() => {
                const vx = Math.abs(velX.get());
                const vy = Math.abs(velY.get());
                const speed = Math.sqrt(vx * vx + vy * vy);
                return Math.min(speed / 400, 0.5) + 0.15; 
            });
            
            const background = useTransform(() => {
                const tx = isBack ? -tiltX.get() : tiltX.get();
                const ty = isBack ? -tiltY.get() : tiltY.get();
                const x = (ty / 20) * 100 + 50;
                const y = (tx / 20) * 100 + 50;
                return `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%)`;
            });

            return (
                <motion.div 
                    className="absolute inset-0 rounded-[2rem] pointer-events-none mix-blend-overlay z-50"
                    style={{ background, opacity }}
                />
            );
        };
		
		const Tooltip = ({ text, isDisabled, children, className = "" }) => {
            const [isRendered, setIsRendered] = useState(false);
            const [isVisible, setIsVisible] = useState(false);
            const [coords, setCoords] = useState({ x: 0, y: 0 });
            const containerRef = useRef(null);
            
            const hideTimeoutRef = useRef(null);
            const unmountTimeoutRef = useRef(null);
            const requestRef = useRef(null);

            const updatePosition = () => {
                if (containerRef.current) {
                    const rect = containerRef.current.getBoundingClientRect();
                    // We use the raw rect values and let CSS handle the transform
                    setCoords({
                        x: rect.left + rect.width / 2,
                        y: rect.top
                    });
                }
            };

            const show = (e) => {
                if (!isDisabled || !text) return;
                
                // Calculate position immediately before rendering
                const rect = containerRef.current.getBoundingClientRect();
                setCoords({ x: rect.left + rect.width / 2, y: rect.top });

                clearTimeout(hideTimeoutRef.current);
                clearTimeout(unmountTimeoutRef.current);
                
                setIsRendered(true);
                setIsVisible(true);

                // Auto-hide after 3 seconds
                hideTimeoutRef.current = setTimeout(() => {
                    hide();
                }, 3000);
            };

            const hide = () => {
                setIsVisible(false);
                clearTimeout(hideTimeoutRef.current);
                unmountTimeoutRef.current = setTimeout(() => {
                    setIsRendered(false);
                }, 300);
            };

            useEffect(() => {
                if (!isRendered) return;

                // This logic ensures the tooltip is LOCKED to the button during scroll
                const handleScroll = () => {
                    if (requestRef.current) cancelAnimationFrame(requestRef.current);
                    
                    requestRef.current = requestAnimationFrame(() => {
                        updatePosition();
                    });
                };
                
                // Find the actual scrolling container (the one with the scrollbar)
                const scrollContainer = containerRef.current?.closest('.overflow-y-auto, .no-scrollbar') || window;
                
                scrollContainer.addEventListener('scroll', handleScroll, { capture: true, passive: true });
                window.addEventListener('touchmove', handleScroll, { capture: true, passive: true });
                
                return () => {
                    if (requestRef.current) cancelAnimationFrame(requestRef.current);
                    scrollContainer.removeEventListener('scroll', handleScroll, { capture: true });
                    window.removeEventListener('touchmove', handleScroll, { capture: true });
                };
            }, [isRendered]);

            return (
                <div 
                    ref={containerRef}
                    className={className}
                    onPointerDownCapture={show}
                    onMouseLeave={hide}
                >
                    {children}
                    {isRendered && text && ReactDOM.createPortal(
                        <div 
                            className={`fixed w-max max-w-xs bg-slate-800 text-white text-xs rounded-md px-3 py-2 shadow-lg z-[150] pointer-events-none text-center transition-opacity duration-300 ease-in-out ${isVisible ? 'opacity-100' : 'opacity-0'}`}
                            style={{ 
                                left: coords.x, 
                                top: coords.y - 8, 
                                transform: 'translate(-50%, -100%)',
                                willChange: 'top, left', // Forces the browser to sync movement
                                backfaceVisibility: 'hidden' // Prevents sub-pixel blurring
                            }}
                        >
                            {text}
                            <div className="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-x-4 border-x-transparent border-t-4 border-t-slate-800"></div>
                        </div>,
                        document.body
                    )}
                </div>
            );
        };

        const CardRevealScreen = ({ player, word, onNext, isLastPlayer, audioManager, onAcknowledge, isOnline, onConfused }) => {
            const [step, setStep] = useState(isOnline ? 'reveal' : 'handover'); 
            const [isFlipped, setIsFlipped] = useState(false);
            
            // 1. Detect Touch Device (for physics)
            const [isTouchDevice] = useState(() => typeof window !== 'undefined' && ('ontouchstart' in window || navigator.maxTouchPoints > 0));
            
            // 2. FOOLPROOF MEDIAN.CO / APK DETECTION
            const [isWebView] = useState(() => {
                if (typeof window === 'undefined') return false;
                
                // Median.co / GoNative injects these objects directly into the app wrapper. 
                // If these exist, we are 100% inside your APK.
                if (window.median || window.gonative) return true;
                
                const ua = navigator.userAgent.toLowerCase();
                // Standard WebView fallbacks just in case
                if (ua.includes('median') || ua.includes('gonative') || ua.includes('wv')) return true;
                if (/iphone|ipod|ipad/.test(ua) && !ua.includes('safari')) return true;
                
                return false;
            });

            // Framer Motion Physics
            const targetRotX = useMotionValue(0);
            const targetRotY = useMotionValue(0);
            
            const springConfig = { damping: 16, stiffness: 52, mass: 1.6 };
            const rotX = useSpring(targetRotX, springConfig);
            const rotY = useSpring(targetRotY, springConfig);
            const velX = useVelocity(rotX);
            const velY = useVelocity(rotY);
            
            const skewX = useTransform(velY, [-1000, 1000], [-3, 3]);
            const skewY = useTransform(velX, [-1000, 1000], [3, -3]);
            const rotZ = useTransform(() => {
                const val = (velX.get() - velY.get()) / 44;
                return Math.max(-5, Math.min(5, val)); 
            });
            const z = useTransform(() => {
                const vx = velX.get();
                const vy = velY.get();
                const speed = Math.sqrt(Math.pow(vx, 2) + Math.pow(vy, 2));
                return Math.min(speed / 6.4, 80);
            });
            const scale = useTransform(z, [0, 80], [1, 1.15]);
            
            const mouseX = useMotionValue(0);
            const mouseY = useMotionValue(0);
            
            const mappedTiltX = useTransform(mouseY, [-0.5, 0.5], [15, -15]);
            const mappedTiltY = useTransform(mouseX, [-0.5, 0.5], [-15, 15]);
            const tiltX = useSpring(mappedTiltX, { damping: 20, stiffness: 150 });
            const tiltY = useSpring(mappedTiltY, { damping: 20, stiffness: 150 });
            
            const finalRotX = useTransform(() => rotX.get() + tiltX.get());
            const finalRotY = useTransform(() => rotY.get() + tiltY.get());

            const handleMouseMove = (e) => {
                if (isTouchDevice) return; 
                const rect = e.currentTarget.getBoundingClientRect();
                const clientX = e.clientX;
                const clientY = e.clientY;
                mouseX.set((clientX - rect.left) / rect.width - 0.5);
                mouseY.set((clientY - rect.top) / rect.height - 0.5);
            };

            const resetMouse = () => { 
                if (isTouchDevice) return;
                mouseX.set(0); 
                mouseY.set(0); 
            };
            
            useEffect(() => {
                if(!isOnline) {
                    setStep('handover');
                    setIsFlipped(false);
                    targetRotY.set(0); 
                } else {
                    setStep('reveal');
                }
            }, [player, isOnline, targetRotY]);
            
            useEffect(() => {
                if (step === 'handover' && player.audioData) {
                    const audio = new Audio(player.audioData);
                    audio.play().catch(e => console.error("Custom audio playback failed:", e));
                }
            }, [player, step]);

            const handleReveal = () => {
                if (!isFlipped) {
                    setIsFlipped(true);
                    targetRotY.set(targetRotY.get() + 180); 
                    audioManager.playSound('cardFlip');
                    if (navigator.vibrate) navigator.vibrate(30);
                    resetMouse();
                }
            };
            
            const handleAckAndNext = () => {
                 audioManager.playSound('uiClick');
                if (isOnline) {
                    onAcknowledge();
                } else {
                    if(navigator.vibrate) navigator.vibrate(20);
                    onNext();
                }
            };

            const renderHandover = () => (
                <div className="flex flex-col items-center justify-center h-full text-center p-8 animate-slide-up relative z-10">
                    <div className="w-32 h-32 rounded-full flex items-center justify-center mb-10 relative">
                        <div className="absolute inset-0 bg-brand-500/20 blur-2xl rounded-full animate-pulse-slow"></div>
                        <div className="glass-panel w-full h-full rounded-full flex items-center justify-center border border-white/10 overflow-hidden">
                            <img src="https://em-content.zobj.net/source/microsoft-teams/363/detective_light-skin-tone_1f575-1f3fb_1f3fb.png" alt="Detective" draggable="false" className="w-35 h-35 relative top-3" />
                        </div>
                    </div>
                    
                    <h2 className="text-xl font-display text-white/60 font-bold tracking-wide mb-1">
                        Pass the device to
                    </h2>
                    <h1 className="text-6xl font-display font-black text-transparent bg-clip-text bg-gradient-to-br from-white via-white/90 to-white/70 drop-shadow-xl break-words max-w-full mb-12">
                        {player.name}
                    </h1>
                    
                    <div className="w-full max-w-sm">
                        <button 
                            onClick={() => {
                                audioManager.playSound('uiClick');
                                setStep('reveal');
                                if (navigator.vibrate) navigator.vibrate(20);
                            }}
                            className="w-full glass-panel hover:bg-white/5 border border-white/10 text-white font-display font-bold text-lg py-5 rounded-[1.5rem] transition-all active:scale-95 flex items-center justify-center gap-3"
                        >
                            <i className="fa-solid fa-fingerprint text-brand-400"></i> Verify Identity
                        </button>
                    </div>
                </div>
            );

            const renderFlipCard = () => (
                <div className="flex flex-col items-center justify-center h-full w-full p-6 relative">
                    <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-sm z-0"></div>

                    <div className="relative w-full max-w-xs aspect-[3/4] z-10 perspective-1000">
                        <motion.div
                            className="relative w-full h-full cursor-pointer transform-style-3d z-10"
                            style={isTouchDevice 
                                ? { rotateY: rotY } 
                                : { rotateX: finalRotX, rotateY: finalRotY, rotateZ: rotZ, z, scale, skewX, skewY }
                            }
                            onMouseMove={!isTouchDevice ? handleMouseMove : undefined} 
                            onMouseLeave={!isTouchDevice ? resetMouse : undefined} 
                            onClick={handleReveal}
                            whileHover={{ scale: isFlipped ? 1 : (isTouchDevice ? 1 : 1.02) }} 
                            whileTap={{ scale: isFlipped ? 1 : 0.98 }}
                        >
                            {/* 3D Depth edges - Safely DISABLED for Median APKs to prevent glitching */}
                            {!isWebView && [...Array(6)].map((_, i) => (
                                <div key={i} className="absolute inset-0 rounded-[2rem] bg-slate-800 border border-slate-700/20 backface-hidden" style={{ transform: `translateZ(${-i}px)`, WebkitBackfaceVisibility: 'hidden' }} />
                            ))}

                            {/* Front (TOP SECRET) */}
                            <div className="absolute inset-0 backface-hidden rounded-[2rem] shadow-[inset_0_0_20px_rgba(0,0,0,0.4)] bg-slate-900 border border-white/10 flex flex-col items-center justify-center p-8 overflow-hidden" 
                                 style={{ transform: isWebView ? 'translateZ(0px)' : 'translateZ(1px)', WebkitBackfaceVisibility: 'hidden' }}>
                                <div className="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>

            const fullStr = lobbyId + password;
            // Mathematically combine 10 characters into one massive Integer
            for (let i = 0; i < 10; i++) {
                combined = combined * 34 + LOBBY_ALPHABET.indexOf(fullStr[i]);
            }
            return combined.toString(36).toUpperCase().padStart(10, '0');
        };

            if (!code || code.length !== 10) return null;
            let combined = parseInt(code, 36);
            if (isNaN(combined)) return null;
            let str = '';
            // Unpack the Integer back into the original 10 characters
            for (let i = 0; i < 10; i++) {
                const char = LOBBY_ALPHABET[combined % 34];
                if (!char) return null;

                    ? currentLobbyPlayers

                        turnOrder: firebase.firestore.FieldValue.delete(),
                    });
                } else {

                if (numRoguePlayers === 1) {
                    const maxVotes = sortedAccused.length > 0 ? sortedAccused[0][1] : 0;
                    const accusedIds = sortedAccused.filter(([, votes]) => votes === maxVotes).map(([id]) => id);

                    if (accusedIds.length === 1 && roguePlayerIds.includes(accusedIds[0])) {
                        result = { winner: 'agents' };
                    } else if (accusedIds.length !== 1) {
                        result = { winner: isFakeWordMode ? 'fakeWordPlayer' : 'imposter', reason: 'tie' };
                    } else {
                        const accusedPlayer = currentLobbyPlayers.find(p => p.id === accusedIds[0]);
                        result = { winner: isFakeWordMode ? 'fakeWordPlayer' : 'imposter', reason: 'wrong_vote', accusedName: accusedPlayer?.name || 'an agent' };
                    }
                } else { 
                    const accusedTopTwoIds = sortedAccused.slice(0, 2).map(([id]) => id);
                    const isTieForSecond = sortedAccused.length > 2 && sortedAccused[1][1] === sortedAccused[2][1];

                    if (accusedTopTwoIds.length < 2 || isTieForSecond) {
                        result = { winner: isFakeWordMode ? 'fakeWordPlayer' : 'imposter', reason: 'tie' };
                    } else {
                        const correctlyIdentified = accusedTopTwoIds.every(id => roguePlayerIds.includes(id));
                        if (correctlyIdentified) {
                            result = { winner: 'agents' };
                        } else {
                            const accusedPlayer = currentLobbyPlayers.find(p => p.id === accusedTopTwoIds.find(id => !roguePlayerIds.includes(id)));
                            result = { winner: isFakeWordMode ? 'fakeWordPlayer' : 'imposter', reason: 'wrong_vote', accusedName: accusedPlayer?.name || 'an agent' };
                        }
                    }
                }
                
                const votingRecord = currentLobbyPlayers.flatMap((voter) => {
                    if (!voter.votedFor || voter.votedFor.length === 0) {
                         return [{
                            voterId: voter.id,
                            voterName: voter.name,
                            votedForName: 'No Vote'
                        }];
                    }
                    return voter.votedFor.map(voteId => ({
                        voterId: voter.id,
                        voterName: voter.name,
                        votedForName: currentLobbyPlayers.find(p => p.id === voteId)?.name || 'Unknown'
                    }));
                });

                await db.collection('lobbies').doc(lobbyId).update({ 
                    gameState: 'result', gameResult: result, votingRecord
                });
            };
            
            const handleRestartOnline = async () => {
                if (!lobbyData || user.uid !== lobbyData.hostId || lobbyData.gameState !== 'result') return;
                
                const updatePayload = {
                    gameState: 'waiting',
                    secretWord: firebase.firestore.FieldValue.delete(),
                    imposterIds: firebase.firestore.FieldValue.delete(),
                    fakeWordPlayerIds: firebase.firestore.FieldValue.delete(),
                    fakeWord: firebase.firestore.FieldValue.delete(),
                    turnOrder: firebase.firestore.FieldValue.delete(),
                    gameResult: firebase.firestore.FieldValue.delete(),
                    missionStartTime: firebase.firestore.FieldValue.delete(),
                    duration: firebase.firestore.FieldValue.delete(),
                    votingRecord: firebase.firestore.FieldValue.delete(),
                    lastRestartReason: firebase.firestore.FieldValue.delete(),
                };

                await db.collection('lobbies').doc(lobbyId).update(updatePayload);
            };

            const handleStart = () => {
                if (audioManagerRef.current) {
                    audioManagerRef.current.unlockAudio();
                    audioManagerRef.current.playSound('uiClick');
                }
                setTimeout(() => {
                    setIsLoading(false);
                    if (initialLobbyParams) {
                        setGameMode('online');
                    }
                }, 50);
            };

            const renderContent = () => {
                if (isLoading || !user || !wordBank) {
                    return <LoadingScreen onStart={handleStart} onFinishedLoading={() => setAppReady(true)} isDataLoading={!wordBank || !user} />;
                }

                if (gameMode === 'select') {
                    return <GameModeSelectionScreen onSelectMode={setGameMode} onShowHowToPlay={() => setShowHowToPlay(true)} audioManager={audioManagerRef.current} onMuteToggle={handleMuteToggle} isMuted={isMuted} roundedWordCount={roundedWordCount} />;
                }

                if (gameMode === 'local') {
                    switch (localGameState) {
                        case 'setup': return <SetupScreen onStartGame={startLocalGame} audioManager={audioManagerRef.current} onBack={handleBackToHome} displayCategories={displayCategories} wordBank={wordBank} activeWordBank={activeWordBank} />;
                        case 'pass':
                            const isFakeWordPlayer = localGameData.isFakeWordMode && localGameData.fakeWordPlayerIndices.includes(localCurrentPlayerIndex);
                            const isImposter = !localGameData.isFakeWordMode && localGameData.imposterIndices.includes(localCurrentPlayerIndex);
                            const wordToShow = isImposter ? "IMPOSTER" : (isFakeWordPlayer ? localGameData.fakeWord : localGameData.secretWord);
                            return <CardRevealScreen key={localCurrentPlayerIndex} player={localGameData.players[localCurrentPlayerIndex]} word={wordToShow} onNext={handleLocalNextPlayer} isLastPlayer={localCurrentPlayerIndex === localGameData.players.length - 1} audioManager={audioManagerRef.current} />;
                        case 'turnOrder': return <TurnOrderScreen players={localGameData.turnOrder} onStartMission={handleStartLocalActiveGame} audioManager={audioManagerRef.current} isHost={true}/>;
                        case 'active': return <GameTimerScreen lobbyData={localGameData} onEndGame={handleLocalEndGame} firstPlayer={localGameData.firstPlayer} audioManager={audioManagerRef.current} isHost={true} lobbyId={null}/>;
                        case 'result': 
                            return <ResultScreen 
                                isLocal={true} lobbyData={localGameData} lobbyPlayers={localGameData.players} 
                                onRestart={handleLocalRestart} onBackToHome={handleBackToHome} audioManager={audioManagerRef.current} isHost={true} 
                            />;
                        default: return <SetupScreen onStartGame={startLocalGame} audioManager={audioManagerRef.current} onBack={handleBackToHome} displayCategories={displayCategories} wordBank={wordBank} activeWordBank={activeWordBank} />;
                    }
                }
                
                if (gameMode === 'online') {
                    if (!lobbyId || !lobbyData) {
                        return <OnlineLobbyScreen user={user} onCreate={handleCreateLobby} onJoin={handleJoinLobby} audioManager={audioManagerRef.current} onBack={handleBackToHome} initialParams={initialLobbyParams} />;
                    }
                    
                    const meAsPlayer = lobbyPlayers.find(p => p.id === user.uid);
                    const isHost = user.uid === lobbyData.hostId;
                    const onlineState = lobbyData.gameState;
                    
                    if (onlineState === 'waiting' || (onlineState === 'reveal' && meAsPlayer?.hasSeenCard)) {
                         return <WaitingRoom lobbyData={lobbyData} lobbyPlayers={lobbyPlayers} user={user} lobbyId={lobbyId} onStartGame={handleStartGameOnline} onStartMission={handleStartMissionOnline} onLeaveLobby={() => isHost ? handleBackToHome() : setShowExitConfirmModal(true)} audioManager={audioManagerRef.current} onConfusionVote={handleConfusionVote} season={currentSeason} displayCategories={displayCategories} wordBank={wordBank} />;
                    }
                    if (onlineState === 'reveal' && !meAsPlayer?.hasSeenCard) {
                        const isFakeWordPlayerOnline = lobbyData.isFakeWordMode && lobbyData.fakeWordPlayerIds?.includes(user.uid);
                        const isImposterOnline = !lobbyData.isFakeWordMode && lobbyData.imposterIds?.includes(user.uid);
                        const wordForOnlinePlayer = isImposterOnline ? "IMPOSTER" : (isFakeWordPlayerOnline ? lobbyData.fakeWord : lobbyData.secretWord);
                        return <CardRevealScreen 
                                        isOnline={true} player={{ name: meAsPlayer?.name }} 
                                        word={wordForOnlinePlayer}
                                        audioManager={audioManagerRef.current}
                                        onAcknowledge={handleAcknowledgeCard}
                                        onConfused={handleDeclareConfusion}
                                     />;
                    }
                    if (onlineState === 'turnOrder') {
                        return <TurnOrderScreen players={lobbyData.turnOrder || []} onStartMission={handleStartActiveMission} audioManager={audioManagerRef.current} isHost={isHost} />;
                    }
                    if (onlineState === 'active') {
                         return <GameTimerScreen 
                            lobbyData={lobbyData} lobbyPlayers={lobbyPlayers} user={user} onEndGame={handleEndGameOnline} 
                            firstPlayer={lobbyData.turnOrder ? lobbyData.turnOrder[0].name : ''} audioManager={audioManagerRef.current} isHost={isHost} lobbyId={lobbyId}
                        />;
                    }
                    if (onlineState === 'voting') {
                        return <VotingScreen lobbyData={lobbyData} lobbyPlayers={lobbyPlayers} user={user} lobbyId={lobbyId} audioManager={audioManagerRef.current} />;
                    }
                    if (onlineState === 'result') {
                        return <ResultScreen 
                            isLocal={false} lobbyData={lobbyData} lobbyPlayers={lobbyPlayers}
                            onRestart={handleRestartOnline} onBackToHome={handleBackToHome} 
                            onConfirmExit={() => setShowExitConfirmModal(true)}
                            audioManager={audioManagerRef.current} isHost={isHost}
                        />;
                    }
                    return <LoadingScreen onStart={handleStart} onFinishedLoading={() => setAppReady(true)} isDataLoading={!wordBank} />; 
                }
            };
            
            return (
                <div className="w-full h-full text-slate-200 font-sans selection:bg-brand-500/30">
					{!isOnlineStatus && <OfflineScreen />} 
					
                    <div className="fixed inset-0 bg-[#020617] -z-10"></div>
                     <div className="absolute inset-0 pointer-events-none">
                        <div className="blob bg-brand-600/30 top-[-20%] left-[-20%] w-[60%] h-[60%]"></div>
                        <div className="blob bg-cyan-600/30 bottom-[-20%] right-[-20%] w-[60%] h-[60%] animation-delay-2000"></div>
                    </div>
                    {showHowToPlay && <HowToPlayModal onClose={() => setShowHowToPlay(false)} />}
                    {showRemovedModal && <RemovedModal onClose={() => {
                        setShowRemovedModal(false);
                    }} />}
                    {lobbyClosedInfo && <LobbyClosedModal hostName={lobbyClosedInfo.hostName} onClose={() => {
                        setLobbyClosedInfo(null);
                    }} />}
                    {restartNotification && <RestartNotificationModal word={restartNotification} onClose={() => setRestartNotification(null)} />}
                    {showImposterVoteNotification && <ImposterVoteNotificationModal onClose={() => setShowImposterVoteNotification(false)} />}
                    {showExitConfirmModal && <ExitLobbyConfirmModal onConfirm={() => { setShowExitConfirmModal(false); handleBackToHome(); }} onCancel={() => setShowExitConfirmModal(false)} />}
                    {renderContent()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
